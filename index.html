<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maqueta · Casco</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --col-mesa:     #d4a853;
  --col-pista:    #4a7fb5;
  --col-barra:    #8a5c35;
  --col-comida:   #5a8a5a;
  --col-deco:     #9a5a8a;
  --col-bombita:  #ffcc44;
  --col-bebedero: #4aacdc;
  --col-otro:     #6a6a6a;
}

body {
  font-family: 'Courier New', monospace;
  background: #111;
  color: #ddd;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

/* ── MAP ── */
#map-wrap {
  flex: 1;
  min-width: 0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#map-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #555;
  flex-shrink: 0;
}

#svg-container {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

#venue {
  width: 100%;
  height: 100%;
  user-select: none;
  overflow: visible;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 288px;
  flex-shrink: 0;
  background: #181818;
  border-left: 1px solid #252525;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.s-section { display: flex; flex-direction: column; gap: 8px; }

.s-title {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: #555;
  padding-bottom: 7px;
  border-bottom: 1px solid #222;
}

label {
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-size: 10px;
  color: #666;
}

select, input {
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 3px;
  color: #ddd;
  font-family: inherit;
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
  width: 100%;
}
select:focus, input:focus { border-color: #9a7a50; }

.frow { display: flex; gap: 6px; }
.frow label { flex: 1; }

.btn {
  border: none;
  border-radius: 3px;
  font-family: inherit;
  font-size: 11px;
  padding: 7px 10px;
  cursor: pointer;
  text-align: center;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn:hover { opacity: .8; }
.btn-add   { background: #9a7a50; color: #f0e8d8; width: 100%; }
.btn-sm    { padding: 5px 8px; font-size: 10px; }
.btn-ghost { background: #232323; color: #aaa; border: 1px solid #2e2e2e; flex: 1; }
.btn-del   { background: #3e1818; color: #e0a0a0; flex: 1; }
.btn-clear { background: #2a1414; color: #b07070; border: 1px solid #3a2020; width: 100%; }

/* Selected panel */
#sel-panel          { display: none; }
#sel-panel.visible  { display: flex; flex-direction: column; gap: 8px; }
#sel-name { font-size: 12px; color: #ccc; }
#sel-dims { font-size: 10px; color: #666; }

/* Item list */
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 7px;
  border-radius: 3px;
  background: #202020;
  border: 1px solid transparent;
  cursor: pointer;
}
.item-row:hover  { border-color: #2e2e2e; }
.item-row.active { border-color: #9a7a50; }

.item-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.item-text { flex: 1; min-width: 0; }
.item-lbl  { font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-sub  { font-size: 9px; color: #555; }

/* Stats */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-card { background: #1e1e1e; border-radius: 3px; padding: 10px; text-align: center; }
.stat-n { font-size: 22px; font-weight: bold; }
.stat-l { font-size: 9px; color: #555; margin-top: 2px; }

.empty { font-size: 10px; color: #444; text-align: center; padding: 10px; }

/* ── LED STRIP ── */
@keyframes led-twinkle {
  0%, 100% { opacity: 1; }
  50%       { opacity: .28; }
}
.led-bulb { animation: led-twinkle 2.2s ease-in-out infinite; }
.led-glow { animation: led-twinkle 2.2s ease-in-out infinite; }

/* ── BEBEDERO ── */
@keyframes beb-shimmer {
  0%, 100% { opacity: .45; }
  50%       { opacity: .82; }
}
@keyframes beb-sparkle {
  0%, 75%, 100% { opacity: 0; }
  38%            { opacity: 1; }
}
@keyframes beb-can-gleam {
  0%, 80%, 100% { opacity: .75; }
  40%            { opacity: 1; }
}
.beb-shimmer  { animation: beb-shimmer  3.8s ease-in-out infinite; }
.beb-sparkle  { animation: beb-sparkle  3.2s ease-in-out infinite; }
.beb-can      { animation: beb-can-gleam 4s  ease-in-out infinite; }

#hint {
  padding: 8px 14px;
  font-size: 9px;
  color: #3a3a3a;
  border-top: 1px solid #1e1e1e;
  letter-spacing: .04em;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- ═══ MAP ═══ -->
<div id="map-wrap">
  <div id="map-top">
    <span>CASCO &nbsp;·&nbsp; PLANTA &nbsp;·&nbsp; 54 × 44 m</span>
    <span id="scale-lbl"></span>
  </div>
  <div id="svg-container">

        <filter id="filter-led" x="-100%" y="-100%" width="300%" height="300%">

          <feMerge>

            <feMergeNode in="SourceGraphic"/>

        <filter id="filter-cold" x="-60%" y="-60%" width="220%" height="220%">

          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge>

            <feMergeNode in="SourceGraphic"/>

        </filter>

      <!-- ── A1: CASA ── -->

      <line x1="2.8" y1="28" x2="2.3" y2="28" stroke="#a09080" stroke-width=".12"/>

      <line x1="25.6" y1="9.6"  x2="28.4" y2="12.4" stroke="#4a6a30" stroke-width=".18"/>
      <line x1="28.4" y1="9.6"  x2="25.6" y2="12.4" stroke="#4a6a30" stroke-width=".18"/>
      <text x="30.2" y="10.7"
            font-size=".88" fill="#4a6a30" font-family="Courier New"

      <text x="30.2" y="11.9"
            font-size=".74" fill="#6a8a50" font-family="Courier New">Ø 5.5 M</text>

      <!-- ── BOMBA ── -->
      <circle cx="27" cy="22" r=".6" fill="#2a2a2a" stroke="#555" stroke-width=".15"/>
      <text x="27.9" y="22.4"

      <!-- ── A2: LABEL ── -->
      <text x="40.5" y="24" text-anchor="middle"
            font-size="2.5" fill="#c8bfae" font-family="Courier New"
            font-weight="bold">A2</text>

      <!-- ── TRANQUERA ── -->
      <line x1="51.5" y1="0" x2="51.5" y2=".8" stroke="#666" stroke-width=".2"/>
      <line x1="54"   y1="0" x2="54"   y2=".8" stroke="#666" stroke-width=".2"/>
      <text x="52.75" y="2.2" text-anchor="middle"

      <!-- ── OMBÚ ── -->
      <circle cx="42.5" cy="2.3" r="1.75"
              fill="#a8c890" fill-opacity=".55"
              stroke="#4a6a30" stroke-width=".18"/>
      <circle cx="42.5" cy="2.3" r=".28" fill="#4a6a30"/>
      <text x="42.5" y="4.9" text-anchor="middle"
            font-size=".78" fill="#4a6a30" font-family="Courier New">OMBÚ</text>

      <!-- ── ÁLAMOS ESTE ── -->
      <circle cx="53" cy="3"  r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="7"  r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="11" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="15" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="19" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="23" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>

      <line x1="54" y1="0" x2="54" y2="44" stroke="#444" stroke-width=".28"/>

<!-- ═══ SIDEBAR ═══ -->
<div id="sidebar">
  <div id="sidebar-scroll">

    <!-- ADD -->
    <div class="s-section">
      <div class="s-title">Agregar ítem</div>

      <label>Tipo
        <select id="i-type">
          <option value="mesa">Mesa</option>
          <option value="pista">Pista de baile</option>
          <option value="barra">Barra</option>
          <option value="comida">Sector comida</option>
          <option value="deco">Decoración</option>
          <option value="bombita">Bombita LED</option>
          <option value="bebedero">Bebedero</option>
          <option value="otro">Otro</option>
        </select>
      </label>

      <label>Nombre
        <input type="text" id="i-label" placeholder="Mesa 1" autocomplete="off">
      </label>

      <div class="frow">
        <label>Ancho (m)
          <input type="number" id="i-w" value="2" min=".5" max="30" step=".5">
        </label>
        <label>Largo (m)
          <input type="number" id="i-h" value="2" min=".5" max="30" step=".5">
        </label>
      </div>

      <button class="btn btn-add" id="btn-add">+ Agregar al mapa</button>
    </div>

    <!-- SELECTED -->
    <div class="s-section" id="sel-panel">
      <div class="s-title">Seleccionado</div>
      <div id="sel-name"></div>
      <div id="sel-dims"></div>
      <div class="frow">
        <button class="btn btn-ghost btn-sm" id="btn-rl">↺ &minus;15°</button>
        <button class="btn btn-ghost btn-sm" id="btn-rr">↻ +15°</button>
      </div>
      <div class="frow">
        <button class="btn btn-ghost btn-sm" id="btn-dup">⧉ Duplicar</button>
        <button class="btn btn-del  btn-sm" id="btn-del">✕ Eliminar</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="s-section">
      <div class="s-title">En el mapa (<span id="item-count">0</span>)</div>
      <div id="item-list"><div class="empty">Sin ítems todavía</div></div>
    </div>

    <!-- STATS -->
    <div class="s-section">
      <div class="s-title">Resumen</div>
      <div class="stats" id="stats">
        <div class="empty" style="grid-column:1/-1">—</div>
      </div>
    </div>

    <!-- CLEAR -->
    <div class="s-section">
      <button class="btn btn-clear btn-sm" id="btn-clear">Limpiar todo</button>
    </div>

  </div>
  <div id="hint">
    R&nbsp;=&nbsp;rotar &nbsp;·&nbsp; D&nbsp;=&nbsp;duplicar &nbsp;·&nbsp; Supr&nbsp;=&nbsp;eliminar &nbsp;·&nbsp; Esc&nbsp;=&nbsp;deseleccionar
  </div>
</div>

<script>
'use strict';

// ─── CONFIG ───────────────────────────────────────────────
const TYPES = {
  mesa:     { label: 'Mesa',           color: '#d4a853', fg: '#1a0e00' },
  pista:    { label: 'Pista de baile', color: '#4a7fb5', fg: '#e0eaf8' },
  barra:    { label: 'Barra',          color: '#8a5c35', fg: '#f0e8d8' },
  comida:   { label: 'Sector comida',  color: '#5a8a5a', fg: '#e0f0e0' },
  deco:     { label: 'Decoración',     color: '#9a5a8a', fg: '#f8e0f8' },
  bombita:  { label: 'Bombita LED',    color: '#ffcc44', fg: '#3a2800' },
  bebedero: { label: 'Bebedero',       color: '#4aacdc', fg: '#001828' },
  otro:     { label: 'Otro',           color: '#6a6a6a', fg: '#f0f0f0' },
};

const NS  = 'http://www.w3.org/2000/svg';
const KEY = 'casco-maqueta-v1';

// ─── STATE ────────────────────────────────────────────────
let S    = { items: [], selId: null, nextId: 1 };
let drag = null;

// ─── PERSISTENCE ──────────────────────────────────────────
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(_) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (d && Array.isArray(d.items)) S = d;
  } catch(_) {}
}

// ─── SVG UTILS ────────────────────────────────────────────
const svgEl = document.getElementById('venue');
const layer = document.getElementById('items-layer');

function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function clientToSVG(cx, cy) {
  const pt = svgEl.createSVGPoint();
  pt.x = cx; pt.y = cy;
  return pt.matrixTransform(svgEl.getScreenCTM().inverse());
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  layer.innerHTML = '';
  for (const item of S.items) drawItem(item);
  renderSidebar();
}

function drawItem(item) {
  const cfg = TYPES[item.type] || TYPES.otro;
  const sel = item.id === S.selId;
  const hw  = item.w / 2;
  const hh  = item.h / 2;

  const outer = el('g', {
    'data-id': item.id,
    transform: `translate(${item.x},${item.y})`,
    cursor: 'grab',
  });
  const inner = el('g', { transform: `rotate(${item.rot},${hw},${hh})` });

  if (item.type === 'bombita') {
    drawLedStrip(inner, item, sel);
  } else if (item.type === 'bebedero') {
    drawBebedero(inner, item, sel);
  } else {
    // Drop shadow
    inner.appendChild(el('rect', {
      x: .04, y: .05, width: item.w, height: item.h,
      fill: '#000', 'fill-opacity': '.22', rx: '.12',
      'pointer-events': 'none',
    }));
    // Body
    inner.appendChild(el('rect', {
      x: 0, y: 0, width: item.w, height: item.h,
      fill: cfg.color,
      'fill-opacity': sel ? '1' : '.88',
      stroke: sel ? '#ffffff' : '#00000033',
      'stroke-width': sel ? '.14' : '.07',
      rx: '.12',
    }));
    // Top highlight gleam
    inner.appendChild(el('rect', {
      x: .06, y: .05, width: item.w - .12, height: Math.min(.18, hh * .4),
      fill: '#fff', 'fill-opacity': '.14', rx: '.08',
      'pointer-events': 'none',
    }));

    const fs  = Math.min(.92, Math.max(.44, Math.min(hw, hh) * .5));
    const lbl = el('text', {
      x: hw, y: hh + fs * .38,
      'text-anchor': 'middle', 'font-size': fs,
      fill: cfg.fg, 'font-family': 'Courier New',
      'pointer-events': 'none',
    });
    lbl.textContent = item.label;
    inner.appendChild(lbl);

    if (item.w >= 1.5 || item.h >= 1.5) {
      const dfs = fs * .7;
      const dim = el('text', {
        x: hw, y: hh + fs * .38 + dfs * 1.35,
        'text-anchor': 'middle', 'font-size': dfs,
        fill: cfg.fg, 'font-family': 'Courier New',
        'fill-opacity': '.6', 'pointer-events': 'none',
      });
      dim.textContent = `${item.w}×${item.h} m`;
      inner.appendChild(dim);
    }

    if (sel) {
      for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
        inner.appendChild(el('rect', {
          x: cx-.22, y: cy-.22, width: .44, height: .44,
          fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
          rx: '.08', 'pointer-events': 'none',
        }));
      }
    }
  }

  outer.appendChild(inner);

  outer.addEventListener('mousedown', e => {
    e.stopPropagation();
    beginDrag(e.clientX, e.clientY, item.id);
  });
  outer.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    beginDrag(e.touches[0].clientX, e.touches[0].clientY, item.id);
  }, { passive: false });

  layer.appendChild(outer);
}

// ─── LED STRIP ────────────────────────────────────────────
function drawLedStrip(g, item, sel) {
  const nBulbs  = Math.max(3, Math.round(item.w / 0.45));
  const spacing = item.w / nBulbs;
  const cableY  = item.h * .5;
  const bulbR   = Math.min(.22, item.h * .4);

  // PCB strip base (dark bar)
  g.appendChild(el('rect', {
    x: 0, y: cableY - bulbR * .55, width: item.w, height: bulbR * 1.1,
    fill: '#1a1000', rx: '.04', 'pointer-events': 'none',
  }));
  // PCB strip highlight
  g.appendChild(el('rect', {
    x: 0, y: cableY - bulbR * .55, width: item.w, height: bulbR * .25,
    fill: '#3a2800', 'fill-opacity': '.7', rx: '.04', 'pointer-events': 'none',
  }));

  for (let i = 0; i < nBulbs; i++) {
    const cx    = (i + .5) * spacing;
    const delay = ((i * .13) % 2.2).toFixed(2);

    g.appendChild(el('circle', {
      cx, cy: cableY, r: bulbR * 2.4,
      fill: '#ffdd66', 'fill-opacity': '.13',
      'pointer-events': 'none',
      class: 'led-glow',
      style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('circle', {
      cx, cy: cableY, r: bulbR,
      fill: '#ffe566', stroke: '#cc9900', 'stroke-width': '.035',
      filter: 'url(#filter-led)',
      'pointer-events': 'none',
      class: 'led-bulb',
      style: `animation-delay:${delay}s`,
    }));
  }

  const lblEl = el('text', {
    x: item.w / 2, y: item.h + .38,
    'text-anchor': 'middle', 'font-size': '.38',
    fill: '#ffcc44', 'font-family': 'Courier New',
    'fill-opacity': '.82', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  const dimEl = el('text', {
    x: item.w / 2, y: item.h + .65,
    'text-anchor': 'middle', 'font-size': '.3',
    fill: '#ffcc44', 'font-family': 'Courier New',
    'fill-opacity': '.45', 'pointer-events': 'none',
  });
  dimEl.textContent = `${item.w} m`;
  g.appendChild(dimEl);

  // Hit area: captura eventos en todo el bounding box del item
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: 'none', 'pointer-events': 'all',
  }));

  if (sel) {
    g.appendChild(el('rect', {
      x: -.15, y: -.15, width: item.w + .3, height: item.h + .3,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      rx: '.12', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none',
    }));
    for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: cx-.22, y: cy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── BEBEDERO ─────────────────────────────────────────────
function drawBebedero(g, item, sel) {
  const brd = 0.055;
  const iX  = brd, iY = brd;
  const iW  = item.w - brd * 2;
  const iH  = item.h - brd * 2;

  // Drop shadow
  g.appendChild(el('rect', {
    x: .03, y: .04, width: item.w, height: item.h,
    fill: '#000', 'fill-opacity': '.35', rx: '.06',
    'pointer-events': 'none',
  }));

  // Outer steel trough frame
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: '#5a3d1e', stroke: '#2c1a08', 'stroke-width': '.04', rx: '.06',
  }));
  // Frame top rim highlight
  g.appendChild(el('rect', {
    x: .01, y: .01, width: item.w - .02, height: brd * .5,
    fill: '#9a6838', 'fill-opacity': '.55', rx: '.04',
    'pointer-events': 'none',
  }));
  // Frame bottom shadow
  g.appendChild(el('rect', {
    x: .01, y: item.h - brd * .4, width: item.w - .02, height: brd * .4,
    fill: '#1a0c04', 'fill-opacity': '.4', rx: '.03',
    'pointer-events': 'none',
  }));

  // Ice/water base fill (static dark blue)
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: '#3a88b0', rx: '.03', 'pointer-events': 'none',
  }));
  // Ice shimmer overlay (animated lighter blue)
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: '#90d4f8', rx: '.03',
    class: 'beb-shimmer', 'pointer-events': 'none',
  }));
  // Surface top reflection
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH * .32,
    fill: '#c8ecff', 'fill-opacity': '.45', rx: '.03',
    'pointer-events': 'none',
  }));

  // Beer can tops (2 rows, spaced proportionally)
  const canR  = Math.min(.042, iH * .32);
  const nCans = Math.max(4, Math.round(iW / .2));
  const canSp = iW / nCans;
  for (let i = 0; i < nCans; i++) {
    const cx    = iX + (i + .5) * canSp;
    const dly   = ((i * .17) % 4).toFixed(2);
    for (const ry of [.28, .72]) {
      const cy = iY + ry * iH;
      // Can body (aluminum top view)
      g.appendChild(el('circle', {
        cx, cy, r: canR,
        fill: '#c8a830', stroke: '#907018', 'stroke-width': '.01',
        'fill-opacity': '.9', 'pointer-events': 'none',
        class: 'beb-can', style: `animation-delay:${dly}s`,
      }));
      // Can ring/tab
      g.appendChild(el('circle', {
        cx, cy: cy - canR * .22, r: canR * .32,
        fill: '#a09050', 'pointer-events': 'none',
      }));
    }
  }

  // Section dividers (trough has 3 compartments)
  for (let d = 1; d <= 2; d++) {
    g.appendChild(el('rect', {
      x: item.w * (d / 3) - .025, y: 0,
      width: .05, height: item.h,
      fill: '#2c1a08', 'pointer-events': 'none',
    }));
  }

  // Ice crystal sparkles
  const sparks = [
    [.06,.45],[.17,.22],[.28,.78],[.39,.38],[.5,.62],
    [.61,.28],[.72,.72],[.83,.42],[.94,.58],
  ];
  for (const [fx, fy] of sparks) {
    const delay = ((fx * 4.1 + fy * 2.3) % 3.2).toFixed(2);
    // 4-point star sparkle (cross of two small rects)
    const cx = iX + fx * iW;
    const cy = iY + fy * iH;
    g.appendChild(el('line', {
      x1: cx - .045, y1: cy, x2: cx + .045, y2: cy,
      stroke: '#fff', 'stroke-width': '.022',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('line', {
      x1: cx, y1: cy - .045, x2: cx, y2: cy + .045,
      stroke: '#fff', 'stroke-width': '.022',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    // Diagonal arms (for 8-point star effect)
    g.appendChild(el('line', {
      x1: cx - .028, y1: cy - .028, x2: cx + .028, y2: cy + .028,
      stroke: '#c8eeff', 'stroke-width': '.013',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('line', {
      x1: cx + .028, y1: cy - .028, x2: cx - .028, y2: cy + .028,
      stroke: '#c8eeff', 'stroke-width': '.013',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
  }

  // Cold glow filter on the inner area
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: 'none', rx: '.03',
    filter: 'url(#filter-cold)',
    'pointer-events': 'none',
  }));

  // Label (below trough)
  const lblEl = el('text', {
    x: item.w / 2, y: item.h + .36,
    'text-anchor': 'middle', 'font-size': '.38',
    fill: '#4aacdc', 'font-family': 'Courier New',
    'fill-opacity': '.9', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  const dimEl = el('text', {
    x: item.w / 2, y: item.h + .62,
    'text-anchor': 'middle', 'font-size': '.29',
    fill: '#4aacdc', 'font-family': 'Courier New',
    'fill-opacity': '.5', 'pointer-events': 'none',
  });
  dimEl.textContent = `${item.w} × ${item.h} m · cervezas & hielo`;
  g.appendChild(dimEl);

  // Hit area: captura eventos en todo el bounding box del item
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: 'none', 'pointer-events': 'all',
  }));

  // Selection highlight
  if (sel) {
    g.appendChild(el('rect', {
      x: -.14, y: -.14, width: item.w + .28, height: item.h + .28,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      rx: '.1', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none',
    }));
    for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: cx-.22, y: cy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── SIDEBAR ──────────────────────────────────────────────
function itemSubLabel(it) {
  if (it.type === 'bombita')  return `${it.w} m · tira LED`;
  if (it.type === 'bebedero') return `${it.w} × ${it.h} m · bebedero`;
  return `${it.w} × ${it.h} m`;
}

function itemDimsLabel(item) {
  if (item.type === 'bombita')  return `${item.w} m · tira LED · ${item.rot}°`;
  if (item.type === 'bebedero') return `${item.w} × ${item.h} m · bebedero · ${item.rot}°`;
  return `${item.w} × ${item.h} m  ·  ${item.rot}°`;
}

function renderSidebar() {
  const item = S.items.find(i => i.id === S.selId);

  const panel = document.getElementById('sel-panel');
  if (item) {
    panel.classList.add('visible');
    document.getElementById('sel-name').textContent = item.label;
    document.getElementById('sel-dims').textContent = itemDimsLabel(item);
  } else {
    panel.classList.remove('visible');
  }

  document.getElementById('item-count').textContent = S.items.length;

  const listEl = document.getElementById('item-list');
  if (S.items.length === 0) {
    listEl.innerHTML = '<div class="empty">Sin ítems todavía</div>';
  } else {
    listEl.innerHTML = '';
    for (const it of S.items) {
      const cfg = TYPES[it.type] || TYPES.otro;
      const row = document.createElement('div');
      row.className = 'item-row' + (it.id === S.selId ? ' active' : '');
      row.innerHTML = `
        <div class="item-dot" style="background:${cfg.color}"></div>
        <div class="item-text">
          <div class="item-lbl">${it.label}</div>
          <div class="item-sub">${itemSubLabel(it)}</div>
        </div>`;
      row.onclick = () => { S.selId = it.id; render(); };
      listEl.appendChild(row);
    }
  }

  const counts = {};
  for (const it of S.items) counts[it.type] = (counts[it.type] || 0) + 1;
  const statsEl = document.getElementById('stats');
  if (Object.keys(counts).length === 0) {
    statsEl.innerHTML = '<div class="empty" style="grid-column:1/-1">—</div>';
  } else {
    statsEl.innerHTML = '';
    for (const [t, n] of Object.entries(counts)) {
      const cfg = TYPES[t] || TYPES.otro;
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML =
        `<div class="stat-n" style="color:${cfg.color}">${n}</div>` +
        `<div class="stat-l">${cfg.label}</div>`;
      statsEl.appendChild(card);
    }
  }
}

// ─── DRAG ─────────────────────────────────────────────────
function beginDrag(clientX, clientY, id) {
  S.selId = id;
  render();
  const item = S.items.find(i => i.id === id);
  const pt   = clientToSVG(clientX, clientY);
  drag = { id, offX: pt.x - item.x, offY: pt.y - item.y };
}

function moveDrag(clientX, clientY) {
  if (!drag) return;
  const pt   = clientToSVG(clientX, clientY);
  const item = S.items.find(i => i.id === drag.id);
  if (!item) return;
  item.x = +( pt.x - drag.offX ).toFixed(2);
  item.y = +( pt.y - drag.offY ).toFixed(2);
  const g = layer.querySelector(`[data-id="${drag.id}"]`);
  if (g) g.setAttribute('transform', `translate(${item.x},${item.y})`);
}

function endDrag() {
  if (drag) { save(); drag = null; }
}

document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
document.addEventListener('mouseup',   endDrag);
document.addEventListener('touchmove', e => {
  if (!drag) return;
  e.preventDefault();
  moveDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchend', endDrag);

svgEl.addEventListener('mousedown', e => {
  if (!e.target.closest('[data-id]')) { S.selId = null; render(); }
});

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!S.selId) return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); del(); }
  else if (e.key === 'r' || e.key === 'R') rotate(e.shiftKey ? -15 : 15);
  else if (e.key === 'd' || e.key === 'D') dup();
  else if (e.key === 'Escape') { S.selId = null; render(); }
});

// ─── ACTIONS ──────────────────────────────────────────────
function addItem() {
  const type   = document.getElementById('i-type').value;
  const rawLbl = document.getElementById('i-label').value.trim();
  const label  = rawLbl || TYPES[type].label + ' ' + S.nextId;
  const w = parseFloat(document.getElementById('i-w').value) || 2;
  const h = parseFloat(document.getElementById('i-h').value) || 2;

  const item = {
    id: S.nextId++, type, label, w, h,
    x: +(27 - w / 2).toFixed(2),
    y: +(22 - h / 2).toFixed(2),
    rot: 0,
  };
  S.items.push(item);
  S.selId = item.id;
  document.getElementById('i-label').value = '';
  save();
  render();
}

function del() {
  S.items = S.items.filter(i => i.id !== S.selId);
  S.selId = null;
  save(); render();
}

function dup() {
  const src = S.items.find(i => i.id === S.selId);
  if (!src) return;
  const copy = { ...src, id: S.nextId++, x: src.x + 1.5, y: src.y + 1.5 };
  S.items.push(copy);
  S.selId = copy.id;
  save(); render();
}

function rotate(delta) {
  const item = S.items.find(i => i.id === S.selId);
  if (!item) return;
  item.rot = (item.rot + delta + 360) % 360;
  save(); render();
}

// ─── BUTTON EVENTS ────────────────────────────────────────
document.getElementById('btn-add').onclick = addItem;
document.getElementById('btn-rl').onclick  = () => rotate(-15);
document.getElementById('btn-rr').onclick  = () => rotate(15);
document.getElementById('btn-dup').onclick = dup;
document.getElementById('btn-del').onclick = del;

document.getElementById('btn-clear').onclick = () => {
  if (confirm('¿Eliminar todos los ítems del mapa?')) {
    S.items = []; S.selId = null;
    save(); render();
  }
};

document.getElementById('i-label').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

document.getElementById('i-type').addEventListener('change', e => {
  document.getElementById('i-label').placeholder =
    (TYPES[e.target.value]?.label || '') + ' 1';
  if (e.target.value === 'bombita') {
    document.getElementById('i-w').value = 10;
    document.getElementById('i-h').value = 0.6;
  } else if (e.target.value === 'bebedero') {
    document.getElementById('i-w').value = 7;
    document.getElementById('i-h').value = 0.6;
  }
});

// ─── INIT ─────────────────────────────────────────────────
load();
render();
</script>
