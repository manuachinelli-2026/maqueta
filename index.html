<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maqueta · Casco</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --col-mesa:     #d4a853;
  --col-pista:    #4a7fb5;
  --col-barra:    #8a5c35;
  --col-comida:   #5a8a5a;
  --col-deco:     #9a5a8a;
  --col-bombita:  #ffcc44;
  --col-bebedero: #4aacdc;
  --col-otro:     #6a6a6a;
}

body {
  font-family: 'Courier New', monospace;
  background: #111;
  color: #ddd;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

/* ── MAP ── */
#map-wrap {
  flex: 1;
  min-width: 0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#map-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #555;
  flex-shrink: 0;
}

#svg-container {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

#venue {
  width: 100%;
  height: 100%;
  user-select: none;
  overflow: visible;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 288px;
  flex-shrink: 0;
  background: #181818;
  border-left: 1px solid #252525;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.s-section { display: flex; flex-direction: column; gap: 8px; }

.s-title {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: #555;
  padding-bottom: 7px;
  border-bottom: 1px solid #222;
}

label {
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-size: 10px;
  color: #666;
}

select, input {
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 3px;
  color: #ddd;
  font-family: inherit;
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
  width: 100%;
}
select:focus, input:focus { border-color: #9a7a50; }
input:disabled { opacity: .38; cursor: not-allowed; }

.frow { display: flex; gap: 6px; }
.frow label { flex: 1; }

.btn {
  border: none;
  border-radius: 3px;
  font-family: inherit;
  font-size: 11px;
  padding: 7px 10px;
  cursor: pointer;
  text-align: center;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn:hover { opacity: .8; }
.btn-add   { background: #9a7a50; color: #f0e8d8; width: 100%; }
.btn-sm    { padding: 5px 8px; font-size: 10px; }
.btn-ghost { background: #232323; color: #aaa; border: 1px solid #2e2e2e; flex: 1; }
.btn-del   { background: #3e1818; color: #e0a0a0; flex: 1; }
.btn-clear { background: #2a1414; color: #b07070; border: 1px solid #3a2020; width: 100%; }

/* Selected panel */
#sel-panel          { display: none; }
#sel-panel.visible  { display: flex; flex-direction: column; gap: 8px; }
#sel-name { font-size: 12px; color: #ccc; }
#sel-dims { font-size: 10px; color: #666; }

/* Item list */
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 7px;
  border-radius: 3px;
  background: #202020;
  border: 1px solid transparent;
  cursor: pointer;
}
.item-row:hover  { border-color: #2e2e2e; }
.item-row.active { border-color: #9a7a50; }

.item-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.item-text { flex: 1; min-width: 0; }
.item-lbl  { font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-sub  { font-size: 9px; color: #555; }

/* Stats */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-card { background: #1e1e1e; border-radius: 3px; padding: 10px; text-align: center; }
.stat-n { font-size: 22px; font-weight: bold; }
.stat-l { font-size: 9px; color: #555; margin-top: 2px; }

.empty { font-size: 10px; color: #444; text-align: center; padding: 10px; }

/* ── LED STRIP ── */
@keyframes led-twinkle {
  0%, 100% { opacity: 1; }
  50%       { opacity: .28; }
}
.led-bulb { animation: led-twinkle 2.2s ease-in-out infinite; }
.led-glow { animation: led-twinkle 2.2s ease-in-out infinite; }

/* ── SIDEBAR GRUPOS ── */
.item-group { margin-bottom: 3px; }
.group-hdr {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 7px; border-radius: 3px;
  background: #1c1c1c; cursor: pointer; user-select: none;
  border: 1px solid transparent;
}
.group-hdr:hover { border-color: #2e2e2e; }
.group-dot  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.group-name { flex: 1; font-size: 9px; color: #777; letter-spacing: .1em; text-transform: uppercase; }
.group-cnt  { font-size: 9px; color: #555; background: #242424; padding: 1px 5px; border-radius: 10px; }
.group-chev { font-size: 9px; color: #444; transition: transform .18s; }
.group-hdr.closed .group-chev { transform: rotate(-90deg); }
.group-body { padding-left: 6px; }
.group-body.closed { display: none; }
.item-row   { margin-bottom: 2px; }

/* ── PISTA LUCES ── */
.pista-beam { opacity: .1; transition: opacity .65s ease; }
body.night .pista-beam { opacity: .75; }
.btn-lights-on  { background: #2a2a10; color: #e8e060; border: 1px solid #5a5a18; flex: 1; }
.btn-lights-off { background: #232323; color: #666; border: 1px solid #2e2e2e; flex: 1; }

/* ── REFLECTOR ── */
@keyframes reflector-flicker {
  0%, 100% { opacity: .06; }
  48%       { opacity: .09; }
  50%       { opacity: .07; }
  52%       { opacity: .10; }
}
@keyframes reflector-flicker-night {
  0%, 100% { opacity: .28; }
  48%       { opacity: .36; }
  50%       { opacity: .30; }
  52%       { opacity: .38; }
}
.reflector-beam        { animation: reflector-flicker       4s ease-in-out infinite; }
body.night .reflector-beam { animation: reflector-flicker-night 4s ease-in-out infinite; }

/* ── NIGHT MODE ── */
#night-rect { pointer-events: none; opacity: 0; transition: opacity .7s ease; }
body.night  #night-rect { opacity: .62; }
.led-bloom       { opacity: .06; transition: opacity .7s ease; }
body.night .led-bloom  { opacity: .48; }
/* Bombitas LED: mucho más discretas que otros elementos */
.led-strip-bloom       { opacity: .015; transition: opacity .7s ease; }
body.night .led-strip-bloom { opacity: .14; }
.btn-night  { background: #12122a; color: #7070b8; border: 1px solid #28285a; width: 100%; }
body.night  .btn-night  { background: #1e1e48; color: #a0a0e0; border-color: #4848a0; }

/* ── LIGHT LAYER ── */
#light-layer { mix-blend-mode: screen; }
.night-bloom { opacity: .03; transition: opacity .7s ease; }
body.night .night-bloom { opacity: .58; }

/* ── BEBEDERO ── */
@keyframes beb-shimmer {
  0%, 100% { opacity: .45; }
  50%       { opacity: .82; }
}
@keyframes beb-sparkle {
  0%, 75%, 100% { opacity: 0; }
  38%            { opacity: 1; }
}
@keyframes beb-can-gleam {
  0%, 80%, 100% { opacity: .75; }
  40%            { opacity: 1; }
}
.beb-shimmer  { animation: beb-shimmer  3.8s ease-in-out infinite; }
.beb-sparkle  { animation: beb-sparkle  3.2s ease-in-out infinite; }
.beb-can      { animation: beb-can-gleam 4s  ease-in-out infinite; }

#hint {
  padding: 8px 14px;
  font-size: 9px;
  color: #3a3a3a;
  border-top: 1px solid #1e1e1e;
  letter-spacing: .04em;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- ═══ MAP ═══ -->
<div id="map-wrap">
  <div id="map-top">
    <span>CASCO &nbsp;·&nbsp; PLANTA &nbsp;·&nbsp; 54 × 44 m</span>
    <span id="scale-lbl"></span>
  </div>
  <div id="svg-container">
    <svg id="venue"
         viewBox="-2 -2 58 48"
         preserveAspectRatio="xMidYMid meet"
         xmlns="http://www.w3.org/2000/svg">

      <!-- ── FILTER DEFS ── -->
      <defs>
        <filter id="filter-led" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation=".1" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="filter-cold" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur in="SourceGraphic" stdDeviation=".07" result="blur"/>
          <feFlood flood-color="#60c8ff" flood-opacity=".35" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge>
            <feMergeNode in="glow"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="filter-item-shadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx=".06" dy=".08" stdDeviation=".06" flood-color="#000" flood-opacity=".4"/>
        </filter>

        <!-- Grass texture filters -->
        <filter id="filter-grass-1" filterUnits="userSpaceOnUse" x="0" y="0" width="54" height="44">
          <feTurbulence type="fractalNoise" baseFrequency="0.13 0.08" numOctaves="4" seed="17" result="n"/>
          <feColorMatrix in="n" type="luminanceToAlpha" result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
        </filter>
        <filter id="filter-grass-2" filterUnits="userSpaceOnUse" x="0" y="0" width="54" height="44">
          <feTurbulence type="fractalNoise" baseFrequency="0.52 0.62" numOctaves="2" seed="31" result="n"/>
          <feColorMatrix in="n" type="luminanceToAlpha" result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
        </filter>
        <filter id="filter-grass-3" filterUnits="userSpaceOnUse" x="0" y="0" width="54" height="44">
          <feTurbulence type="fractalNoise" baseFrequency="0.06 0.04" numOctaves="2" seed="5" result="n"/>
          <feColorMatrix in="n" type="luminanceToAlpha" result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
        </filter>

        <!-- LED / bebedero / reflector light bloom -->
        <filter id="filter-led-bloom" x="-30%" y="-250%" width="160%" height="600%">
          <feGaussianBlur stdDeviation=".65"/>
        </filter>
        <filter id="filter-reflector-beam" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="1.1"/>
        </filter>

        <!-- Piso de madera: veta horizontal (planks) -->
        <filter id="filter-wood" x="-2%" y="-2%" width="104%" height="104%">
          <feTurbulence type="fractalNoise" baseFrequency="0.05 2.8"
                        numOctaves="3" seed="55" result="grain"/>
          <feColorMatrix in="grain" type="luminanceToAlpha" result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
        </filter>

        <!-- Zinc roof patterns for CASA -->
        <pattern id="pattern-zinc-n" x="3.5" y="27" width=".3" height="7.5" patternUnits="userSpaceOnUse">
          <rect width=".3" height="7.5" fill="#a8b0ae"/>
          <rect x=".09" width=".13" height="7.5" fill="#d4dcd8" fill-opacity=".78"/>
          <rect x=".22" width=".05" height="7.5" fill="#909898" fill-opacity=".4"/>
        </pattern>
        <pattern id="pattern-zinc-s" x="3.5" y="34.5" width=".3" height="7.5" patternUnits="userSpaceOnUse">
          <rect width=".3" height="7.5" fill="#888e8c"/>
          <rect x=".09" width=".13" height="7.5" fill="#b0b8b6" fill-opacity=".7"/>
          <rect x=".22" width=".05" height="7.5" fill="#70787a" fill-opacity=".4"/>
        </pattern>

        <!-- Ambient light filter for light layer -->
        <filter id="filter-ambient" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="2.2"/>
        </filter>

        <!-- Higuera: desplazamiento orgánico para bordes irregulares -->
        <filter id="filter-higuera" filterUnits="userSpaceOnUse"
                x="22.5" y="7.5" width="9" height="8.5">
          <feTurbulence type="fractalNoise" baseFrequency="1.8 2.2"
                        numOctaves="2" seed="37" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n"
                             scale=".1" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>

      <!-- ── BACKGROUNDS ── -->
      <rect x="-2" y="-2" width="58" height="48" fill="#161616"/>

      <!-- ── PASTO ── dark base (menos saturado, más real) -->
      <rect x="0" y="0" width="54" height="44" fill="#2e4e12"/>
      <!-- manchas verdes naturales -->
      <rect x="0" y="0" width="54" height="44" fill="#415e1a" filter="url(#filter-grass-1)" opacity=".92"/>
      <!-- detalle fino, tonos más apagados -->
      <rect x="0" y="0" width="54" height="44" fill="#5a7824" filter="url(#filter-grass-2)" opacity=".32"/>
      <!-- pasto seco amarillo-opaco -->
      <rect x="0" y="0" width="54" height="44" fill="#68701a" filter="url(#filter-grass-3)" opacity=".16"/>

      <!-- ── CAMINO DE ÁRBOLES NORTE · dos filas, matorral tupido ── -->
      <rect x="0" y="0" width="27" height="4" fill="#1a2e08"/>
      <!-- Sombras base fila 1 (y≈1.1) -->
      <circle cx="0" cy="1.1" r="1.55" fill="#1e3208"/><circle cx="2.5" cy="1.1" r="1.5" fill="#1c3008"/><circle cx="5" cy="1.1" r="1.55" fill="#203408"/><circle cx="7.5" cy="1.1" r="1.5" fill="#1e3208"/><circle cx="10" cy="1.1" r="1.55" fill="#1c3008"/><circle cx="12.5" cy="1.1" r="1.5" fill="#203408"/><circle cx="15" cy="1.1" r="1.55" fill="#1e3208"/><circle cx="17.5" cy="1.1" r="1.5" fill="#1c3008"/><circle cx="20" cy="1.1" r="1.55" fill="#203408"/><circle cx="22.5" cy="1.1" r="1.5" fill="#1e3208"/><circle cx="25" cy="1.1" r="1.55" fill="#1c3008"/><circle cx="27" cy="1.1" r="1.4" fill="#1e3208"/>
      <!-- Sombras base fila 2 (y≈2.9) -->
      <circle cx="1.25" cy="2.9" r="1.55" fill="#1c3008"/><circle cx="3.75" cy="2.9" r="1.5" fill="#203408"/><circle cx="6.25" cy="2.9" r="1.55" fill="#1e3208"/><circle cx="8.75" cy="2.9" r="1.5" fill="#1c3008"/><circle cx="11.25" cy="2.9" r="1.55" fill="#203408"/><circle cx="13.75" cy="2.9" r="1.5" fill="#1e3208"/><circle cx="16.25" cy="2.9" r="1.55" fill="#1c3008"/><circle cx="18.75" cy="2.9" r="1.5" fill="#203408"/><circle cx="21.25" cy="2.9" r="1.55" fill="#1e3208"/><circle cx="23.75" cy="2.9" r="1.5" fill="#1c3008"/><circle cx="26.25" cy="2.9" r="1.4" fill="#1e3208"/>
      <!-- Capa media fila 1 -->
      <circle cx="0" cy="1.0" r="1.1" fill="#304e12"/><circle cx="2.5" cy="1.0" r="1.05" fill="#2c4a10"/><circle cx="5" cy="1.0" r="1.1" fill="#324e12"/><circle cx="7.5" cy="1.0" r="1.05" fill="#304c10"/><circle cx="10" cy="1.0" r="1.1" fill="#2c4a10"/><circle cx="12.5" cy="1.0" r="1.05" fill="#324e12"/><circle cx="15" cy="1.0" r="1.1" fill="#304c10"/><circle cx="17.5" cy="1.0" r="1.05" fill="#2c4a10"/><circle cx="20" cy="1.0" r="1.1" fill="#324e12"/><circle cx="22.5" cy="1.0" r="1.05" fill="#304c10"/><circle cx="25" cy="1.0" r="1.1" fill="#2c4a10"/><circle cx="27" cy="1.0" r="1.0" fill="#304e12"/>
      <!-- Capa media fila 2 -->
      <circle cx="1.25" cy="2.8" r="1.1" fill="#2c4a10"/><circle cx="3.75" cy="2.8" r="1.05" fill="#324e12"/><circle cx="6.25" cy="2.8" r="1.1" fill="#304c10"/><circle cx="8.75" cy="2.8" r="1.05" fill="#2c4a10"/><circle cx="11.25" cy="2.8" r="1.1" fill="#324e12"/><circle cx="13.75" cy="2.8" r="1.05" fill="#304c10"/><circle cx="16.25" cy="2.8" r="1.1" fill="#2c4a10"/><circle cx="18.75" cy="2.8" r="1.05" fill="#324e12"/><circle cx="21.25" cy="2.8" r="1.1" fill="#304c10"/><circle cx="23.75" cy="2.8" r="1.05" fill="#2c4a10"/><circle cx="26.25" cy="2.8" r="1.0" fill="#324e12"/>
      <!-- Highlights fila 1 -->
      <circle cx="0" cy=".9" r=".58" fill="#3e6818"/><circle cx="2.5" cy=".9" r=".55" fill="#3c6618"/><circle cx="5" cy=".9" r=".58" fill="#406a1a"/><circle cx="7.5" cy=".9" r=".55" fill="#3e6818"/><circle cx="10" cy=".9" r=".58" fill="#3c6618"/><circle cx="12.5" cy=".9" r=".55" fill="#406a1a"/><circle cx="15" cy=".9" r=".58" fill="#3e6818"/><circle cx="17.5" cy=".9" r=".55" fill="#3c6618"/><circle cx="20" cy=".9" r=".58" fill="#406a1a"/><circle cx="22.5" cy=".9" r=".55" fill="#3e6818"/><circle cx="25" cy=".9" r=".58" fill="#3c6618"/><circle cx="27" cy=".9" r=".52" fill="#3e6818"/>
      <!-- Highlights fila 2 -->
      <circle cx="1.25" cy="2.7" r=".58" fill="#3c6618"/><circle cx="3.75" cy="2.7" r=".55" fill="#406a1a"/><circle cx="6.25" cy="2.7" r=".58" fill="#3e6818"/><circle cx="8.75" cy="2.7" r=".55" fill="#3c6618"/><circle cx="11.25" cy="2.7" r=".58" fill="#406a1a"/><circle cx="13.75" cy="2.7" r=".55" fill="#3e6818"/><circle cx="16.25" cy="2.7" r=".58" fill="#3c6618"/><circle cx="18.75" cy="2.7" r=".55" fill="#406a1a"/><circle cx="21.25" cy="2.7" r=".58" fill="#3e6818"/><circle cx="23.75" cy="2.7" r=".55" fill="#3c6618"/><circle cx="26.25" cy="2.7" r=".52" fill="#3e6818"/>
      <!-- Troncos sutiles -->
      <g fill="#1a1008" opacity=".45"><circle cx="0" cy="1.1" r=".1"/><circle cx="2.5" cy="1.1" r=".1"/><circle cx="5" cy="1.1" r=".1"/><circle cx="7.5" cy="1.1" r=".1"/><circle cx="10" cy="1.1" r=".1"/><circle cx="12.5" cy="1.1" r=".1"/><circle cx="15" cy="1.1" r=".1"/><circle cx="17.5" cy="1.1" r=".1"/><circle cx="20" cy="1.1" r=".1"/><circle cx="22.5" cy="1.1" r=".1"/><circle cx="25" cy="1.1" r=".1"/><circle cx="1.25" cy="2.9" r=".1"/><circle cx="3.75" cy="2.9" r=".1"/><circle cx="6.25" cy="2.9" r=".1"/><circle cx="8.75" cy="2.9" r=".1"/><circle cx="11.25" cy="2.9" r=".1"/><circle cx="13.75" cy="2.9" r=".1"/><circle cx="16.25" cy="2.9" r=".1"/><circle cx="18.75" cy="2.9" r=".1"/><circle cx="21.25" cy="2.9" r=".1"/><circle cx="23.75" cy="2.9" r=".1"/></g>

      <!-- ── A1: CASA · techo zinc dos aguas (movida 2m norte) ── -->
      <!-- Sombra -->
      <rect x="3.7" y="27.2" width="20.2" height="15.2" fill="#0a0808" fill-opacity=".2" rx=".1"/>
      <!-- Camino de pasto (2m entre el campo y la casa) — vacío, pasto visible -->
      <!-- Slope norte (chapa gris metálica brillosa) -->
      <rect x="3.5" y="27" width="20" height="7.5" fill="url(#pattern-zinc-n)"/>
      <!-- Slope sur -->
      <rect x="3.5" y="34.5" width="20" height="7.5" fill="url(#pattern-zinc-s)"/>
      <!-- Caballete (ridge) -->
      <line x1="3.5" y1="34.5" x2="23.5" y2="34.5" stroke="#505858" stroke-width=".2"/>
      <!-- Contorno exterior -->
      <rect x="3.5" y="27" width="20" height="15" fill="none" stroke="#505858" stroke-width=".2"/>
      <!-- Hastiales -->
      <line x1="3.5" y1="27" x2="3.5" y2="42" stroke="#505858" stroke-width=".14"/>
      <line x1="23.5" y1="27" x2="23.5" y2="42" stroke="#505858" stroke-width=".14"/>
      <!-- Texto -->
      <text x="13.5" y="36.0" text-anchor="middle" font-size="1.1" fill="#505858" font-family="Courier New" letter-spacing=".08em" font-weight="bold">CASA</text>

      <!-- ── A1: ÁRBOLES LATERAL OESTE ── -->
      <circle cx="1" cy="6"  r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="10" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="14" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="18" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="22" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="26" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>

      <!-- ── A1: COTAS ── -->

        <button class="btn btn-lights-off btn-sm" id="btn-lights">💡 Luces OFF</button>
      </div>
      <div class="frow">
        <button class="btn btn-ghost btn-sm" id="btn-dup">⧉ Duplicar</button>
        <button class="btn btn-del  btn-sm" id="btn-del">✕ Eliminar</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="s-section">
      <div class="s-title">En el mapa (<span id="item-count">0</span>)</div>
      <div id="item-list"><div class="empty">Sin ítems todavía</div></div>
    </div>

    <!-- STATS -->
    <div class="s-section">
      <div class="s-title">Resumen</div>
      <div class="stats" id="stats">
        <div class="empty" style="grid-column:1/-1">—</div>
      </div>
    </div>

    <!-- NIGHT -->
    <div class="s-section">
      <button class="btn btn-night" id="btn-night">☾ &nbsp;Bajar luz</button>
    </div>

    <!-- CLEAR -->
    <div class="s-section">
      <button class="btn btn-clear btn-sm" id="btn-clear">Limpiar todo</button>
    </div>

  </div>
  <div id="hint">
    R&nbsp;=&nbsp;rotar &nbsp;·&nbsp; D&nbsp;=&nbsp;duplicar &nbsp;·&nbsp; Supr&nbsp;=&nbsp;eliminar &nbsp;·&nbsp; Esc&nbsp;=&nbsp;deseleccionar
  </div>
</div>

<script>
'use strict';

// ─── CONFIG ───────────────────────────────────────────────
const TYPES = {
  mesa:     { label: 'Mesa',           color: '#d4a853', fg: '#1a0e00' },
  mesaimp:  { label: 'Mesa Imperial',  color: '#e8e4d8', fg: '#2a2418' },
  pista:    { label: 'Pista de baile', color: '#b87840', fg: '#1a0800' },
  barra:    { label: 'Barra',          color: '#8a5c35', fg: '#f0e8d8' },
  comida:   { label: 'Sector comida',  color: '#5a8a5a', fg: '#e0f0e0' },
  deco:     { label: 'Decoración',     color: '#9a5a8a', fg: '#f8e0f8' },
  bombita:  { label: 'Bombita LED',    color: '#ffcc44', fg: '#3a2800' },
  bebedero:  { label: 'Bebedero',       color: '#4aacdc', fg: '#001828' },
  reflector: { label: 'Reflector',     color: '#e8e0a0', fg: '#1a1800' },
  cuina:     { label: 'Cuina Catering', color: '#c8a040', fg: '#1a1000' },
  barra:     { label: 'Barra de fardos', color: '#c8b060', fg: '#1a1200' },
  living:    { label: 'Living Gervasioni', color: '#c0906c', fg: '#1a0c00' },
  livingf:   { label: 'Living Fardos',    color: '#bdb47e', fg: '#1a1000' },
  vela:      { label: 'Vela de piso',   color: '#f0a828', fg: '#1a0800' },
  sanitario: { label: 'Baño VIP',       color: '#d4a870', fg: '#1a0e00' },
  texto:     { label: 'Texto',          color: '#1a1a1a', fg: '#ffffff' },
  otro:      { label: 'Otro',          color: '#6a6a6a', fg: '#f0f0f0' },
};

const NS  = 'http://www.w3.org/2000/svg';
const KEY = 'casco-maqueta-v1';

// ─── STATE ────────────────────────────────────────────────
let S    = { items: [], selId: null, nextId: 1 };
let drag = null;

// ─── PERSISTENCE ──────────────────────────────────────────
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(_) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (d && Array.isArray(d.items)) S = d;
  } catch(_) {}
}

// ─── SVG UTILS ────────────────────────────────────────────
const svgEl = document.getElementById('venue');
const layer = document.getElementById('items-layer');

function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function clientToSVG(cx, cy) {
  const pt = svgEl.createSVGPoint();
  pt.x = cx; pt.y = cy;
  return pt.matrixTransform(svgEl.getScreenCTM().inverse());
}

// ─── ITEM CACHE ───────────────────────────────────────────
// Clave que representa el estado visual de un ítem (sin posición).
// Si esta clave no cambia, el nodo SVG se reutiliza tal cual.
const itemCache = new Map(); // id → { node, key, x, y }

function itemKey(item, sel) {
  return `${item.type}|${item.w}|${item.h}|${item.rot}|${sel?1:0}|${item.label}|${item.lightsOn?1:0}`;
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  const seen = new Set();

  for (const item of S.items) {
    seen.add(item.id);
    const sel   = item.id === S.selId;
    const key   = itemKey(item, sel);
    const cache = itemCache.get(item.id);

    if (!cache || cache.key !== key) {
      // Estado visual cambió → reconstruir nodo
      if (cache) cache.node.remove();
      const node = buildItem(item, sel);
      itemCache.set(item.id, { node, key, x: item.x, y: item.y });
    } else if (cache.x !== item.x || cache.y !== item.y) {
      // Solo cambió la posición → actualizar transform (barato)
      cache.node.setAttribute('transform', `translate(${item.x},${item.y})`);
      cache.x = item.x;
      cache.y = item.y;
    }
  }

  // Eliminar nodos de ítems borrados
  for (const [id, cache] of itemCache) {
    if (!seen.has(id)) { cache.node.remove(); itemCache.delete(id); }
  }

  // Reordenar DOM para que coincida con S.items (moves baratos, no clones)
  const frag = document.createDocumentFragment();
  for (const item of S.items) frag.appendChild(itemCache.get(item.id).node);
  layer.appendChild(frag);

  rebuildLightLayer();
  renderSidebar();
}

function buildItem(item, sel) {
  const cfg = TYPES[item.type] || TYPES.otro;
  const hw  = item.w / 2;
  const hh  = item.h / 2;

  const outer = el('g', {
    'data-id': item.id,
    transform: `translate(${item.x},${item.y})`,
    cursor: 'grab',
  });
  const inner = el('g', { transform: `rotate(${item.rot},${hw},${hh})` });

  if (item.type === 'mesaimp') {
    drawMesaImp(inner, item, sel);
  } else if (item.type === 'pista') {
    drawPista(inner, item, sel);
  } else if (item.type === 'bombita') {
    drawLedStrip(inner, item, sel);
  } else if (item.type === 'bebedero') {
    drawBebedero(inner, item, sel);
  } else if (item.type === 'reflector') {
    drawReflector(inner, item, sel);
  } else if (item.type === 'cuina') {
    drawCuina(inner, item, sel);
  } else if (item.type === 'barra') {
    drawBarra(inner, item, sel);
  } else if (item.type === 'living') {
    drawLiving(inner, item, sel);
  } else if (item.type === 'texto') {
    drawTexto(inner, item, sel);
  } else if (item.type === 'vela') {
    drawVela(inner, item, sel);
  } else if (item.type === 'livingf') {
    drawLivingFardos(inner, item, sel);
  } else if (item.type === 'sanitario') {
    drawSanitario(inner, item, sel);
  } else {
    // Drop shadow
    inner.appendChild(el('rect', {
      x: .04, y: .05, width: item.w, height: item.h,
      fill: '#000', 'fill-opacity': '.22', rx: '.12',
      'pointer-events': 'none',
    }));
    // Body
    inner.appendChild(el('rect', {
      x: 0, y: 0, width: item.w, height: item.h,
      fill: cfg.color,
      'fill-opacity': sel ? '1' : '.88',
      stroke: sel ? '#ffffff' : '#00000033',
      'stroke-width': sel ? '.14' : '.07',
      rx: '.12',
    }));
    // Top highlight gleam
    inner.appendChild(el('rect', {
      x: .06, y: .05, width: item.w - .12, height: Math.min(.18, hh * .4),
      fill: '#fff', 'fill-opacity': '.14', rx: '.08',
      'pointer-events': 'none',
    }));

    const fs  = Math.min(.92, Math.max(.44, Math.min(hw, hh) * .5));
    const lbl = el('text', {
      x: hw, y: hh + fs * .38,
      'text-anchor': 'middle', 'font-size': fs,
      fill: cfg.fg, 'font-family': 'Courier New',
      'pointer-events': 'none',
    });
    lbl.textContent = item.label;
    inner.appendChild(lbl);

    if (item.w >= 1.5 || item.h >= 1.5) {
      const dfs = fs * .7;
      const dim = el('text', {
        x: hw, y: hh + fs * .38 + dfs * 1.35,
        'text-anchor': 'middle', 'font-size': dfs,
        fill: cfg.fg, 'font-family': 'Courier New',
        'fill-opacity': '.6', 'pointer-events': 'none',
      });
      dim.textContent = `${item.w}×${item.h} m`;
      inner.appendChild(dim);
    }

    if (sel) {
      for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
        inner.appendChild(el('rect', {
          x: cx-.22, y: cy-.22, width: .44, height: .44,
          fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
          rx: '.08', 'pointer-events': 'none',
        }));
      }
    }
  }

  outer.appendChild(inner);

  outer.addEventListener('mousedown', e => {
    e.stopPropagation();
    beginDrag(e.clientX, e.clientY, item.id);
  });
  outer.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    beginDrag(e.touches[0].clientX, e.touches[0].clientY, item.id);
  }, { passive: false });

  return outer;
}

// ─── PISTA DE BAILE ───────────────────────────────────────
function drawPista(g, item, sel) {
  const hw = item.w / 2, hh = item.h / 2;
  const tm = Math.min(.28, item.w * .04); // truss margin
  const bw = .13;  // beam width

  // ── PISO DE MADERA ──
  g.appendChild(el('rect', {
    x: .04, y: .05, width: item.w, height: item.h,
    fill: '#000', 'fill-opacity': '.22', rx: '.07', 'pointer-events': 'none',
  }));
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: '#8a4218', rx: '.06',
  }));
  // Veta/fibra de madera (filter)
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: '#c06828', 'fill-opacity': '.55',
    filter: 'url(#filter-wood)', rx: '.06', 'pointer-events': 'none',
  }));
  // Tablas: líneas horizontales (separación de tablas ~0.28m)
  const pH = .28, pW = 1.65;
  const nRows = Math.ceil(item.h / pH);
  for (let r = 1; r < nRows; r++) {
    const y = r * pH;
    if (y >= item.h) break;
    g.appendChild(el('line', {
      x1: 0, y1: y, x2: item.w, y2: y,
      stroke: '#4a1e08', 'stroke-width': '.018', 'stroke-opacity': '.7',
      'pointer-events': 'none',
    }));
  }
  // Cortes verticales de tablas (staggered, aspecto parquet)
  for (let r = 0; r < nRows; r++) {
    const y1 = r * pH, y2 = Math.min((r + 1) * pH, item.h);
    const off = (r % 2) ? pW * .5 : 0;
    for (let x = off; x < item.w; x += pW) {
      if (x <= 0) continue;
      g.appendChild(el('line', {
        x1: x, y1: y1, x2: x, y2: y2,
        stroke: '#4a1e08', 'stroke-width': '.013', 'stroke-opacity': '.45',
        'pointer-events': 'none',
      }));
    }
  }
  // Lustre: reflejo suave en la parte superior
  g.appendChild(el('rect', {
    x: .04, y: .04, width: item.w - .08, height: item.h * .28,
    fill: '#fff', 'fill-opacity': '.05', rx: '.04', 'pointer-events': 'none',
  }));

  // ── LUCES DE TRUSS (pools en el piso, debajo del truss) ──
  if (item.lightsOn) {
    const PCOLS = ['#4060ff','#c040e0','#40b8ff','#ff4090','#ffaa20','#40e0a0'];
    const nL = Math.max(2, Math.round((item.w - tm * 2) / .75));
    for (let i = 0; i < nL; i++) {
      const lx = tm + (i + .5) * (item.w - tm * 2) / nL;
      for (const ly of [tm + bw, item.h - tm - bw]) {
        g.appendChild(el('ellipse', {
          cx: lx, cy: item.h / 2,
          rx: .85, ry: 1.1,
          fill: PCOLS[i % PCOLS.length], 'fill-opacity': '1',
          filter: 'url(#filter-led-bloom)',
          'pointer-events': 'none',
          class: 'pista-beam',
          style: `animation-delay:${(i * .18).toFixed(2)}s`,
        }));
      }
    }
  }

  // ── ESTRUCTURA TRUSS (vista desde arriba) ──
  // Vigas: 4 lados
  const beams = [
    [tm, tm - bw/2, item.w - tm*2, bw],              // N
    [tm, item.h - tm - bw/2, item.w - tm*2, bw],     // S
    [tm - bw/2, tm, bw, item.h - tm*2],               // W
    [item.w - tm - bw/2, tm, bw, item.h - tm*2],      // E
  ];
  for (const [x, y, w, h] of beams) {
    g.appendChild(el('rect', {
      x, y, width: w, height: h,
      fill: '#c8c8be', stroke: '#90907e', 'stroke-width': '.018', rx: '.035',
      'pointer-events': 'none',
    }));
    // Celosía (diagonal detail en la viga)
    const isH = w > h;
    const len = isH ? w : h;
    const step = .28;
    for (let s = 0; s < len; s += step) {
      const x1 = isH ? x + s       : x,          y1 = isH ? y       : y + s;
      const x2 = isH ? x + s + step/2 : x + w,   y2 = isH ? y + h   : y + s + step/2;
      g.appendChild(el('line', {
        x1, y1, x2, y2,
        stroke: '#a0a090', 'stroke-width': '.009', 'stroke-opacity': '.6',
        'pointer-events': 'none',
      }));
    }
  }
  // Columnas en esquinas
  for (const [cx, cy] of [[tm,tm],[item.w-tm,tm],[tm,item.h-tm],[item.w-tm,item.h-tm]]) {
    g.appendChild(el('circle', { cx, cy, r: .14, fill: '#b0b0a4', stroke: '#686858', 'stroke-width': '.03', 'pointer-events': 'none' }));
    g.appendChild(el('circle', { cx, cy, r: .062, fill: '#787870', 'pointer-events': 'none' }));
  }
  // PAR cans en vigas N y S
  const nCans = Math.max(2, Math.round((item.w - tm*2) / .68));
  const LENS  = ['#6080ff','#d060ff','#50d0ff','#ff5098','#ffc040'];
  for (let i = 0; i < nCans; i++) {
    const cx = tm + (i + .5) * (item.w - tm*2) / nCans;
    for (const cy of [tm, item.h - tm]) {
      const col = item.lightsOn ? LENS[i % LENS.length] : '#383838';
      g.appendChild(el('circle', { cx, cy, r: .095, fill: '#1e1e1e', stroke: '#505048', 'stroke-width': '.022', 'pointer-events': 'none' }));
      const lensAttrs = { cx, cy, r: .055, fill: col, 'pointer-events': 'none' };
      if (item.lightsOn) { lensAttrs.filter = 'url(#filter-led)'; lensAttrs.class = 'led-bulb'; lensAttrs.style = `animation-delay:${(i*.12).toFixed(2)}s`; }
      g.appendChild(el('circle', lensAttrs));
    }
  }

  // ── LABEL ──
  const fs = Math.min(.72, Math.max(.32, Math.min(hw, hh) * .2));
  const lbl = el('text', {
    x: hw, y: hh + fs * .4,
    'text-anchor': 'middle', 'font-size': fs,
    fill: '#d4a870', 'font-family': 'Courier New',
    'fill-opacity': '.65', 'pointer-events': 'none',
  });
  lbl.textContent = item.label;
  g.appendChild(lbl);

  // ── HIT + SEL ──
  g.appendChild(el('rect', { x: 0, y: 0, width: item.w, height: item.h, fill: 'none', 'pointer-events': 'all' }));
  if (sel) {
    g.appendChild(el('rect', { x: -.12, y: -.12, width: item.w + .24, height: item.h + .24, fill: 'none', stroke: '#fff', 'stroke-width': '.1', rx: '.1', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none' }));
    for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]])
      g.appendChild(el('rect', { x: cx-.22, y: cy-.22, width: .44, height: .44, fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06', rx: '.08', 'pointer-events': 'none' }));
  }
}

// ─── LED STRIP ────────────────────────────────────────────
function drawLedStrip(g, item, sel) {
  const nBulbs  = Math.max(3, Math.round(item.w / 0.45));
  const spacing = item.w / nBulbs;
  const cableY  = item.h * .5;
  const bulbR   = Math.min(.12, item.h * .38);

  // Warm light bloom — discreto (led-strip-bloom, mucho menos que reflector/fuego)
  g.appendChild(el('ellipse', {
    cx: item.w / 2, cy: cableY,
    rx: item.w / 2 + .7, ry: 1.2,
    fill: '#ffd060',
    filter: 'url(#filter-led-bloom)',
    'pointer-events': 'none',
    class: 'led-strip-bloom',
  }));

  // PCB strip base (dark bar)
  g.appendChild(el('rect', {
    x: 0, y: cableY - bulbR * .55, width: item.w, height: bulbR * .8,
    fill: '#1a1000', rx: '.04', 'pointer-events': 'none',
  }));
  // PCB strip highlight
  g.appendChild(el('rect', {
    x: 0, y: cableY - bulbR * .55, width: item.w, height: bulbR * .25,
    fill: '#3a2800', 'fill-opacity': '.7', rx: '.04', 'pointer-events': 'none',
  }));

  for (let i = 0; i < nBulbs; i++) {
    const cx    = (i + .5) * spacing;
    const delay = ((i * .13) % 2.2).toFixed(2);

    g.appendChild(el('circle', {
      cx, cy: cableY, r: bulbR * 1.8,
      fill: '#ffdd66', 'fill-opacity': '.07',
      'pointer-events': 'none',
      class: 'led-glow',
      style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('circle', {
      cx, cy: cableY, r: bulbR,
      fill: '#ffe566', stroke: '#cc9900', 'stroke-width': '.035',
      filter: 'url(#filter-led)',
      'pointer-events': 'none',
      class: 'led-bulb',
      style: `animation-delay:${delay}s`,
    }));
  }

  const lblEl = el('text', {
    x: item.w / 2, y: item.h + .38,
    'text-anchor': 'middle', 'font-size': '.38',
    fill: '#ffcc44', 'font-family': 'Courier New',
    'fill-opacity': '.82', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  const dimEl = el('text', {
    x: item.w / 2, y: item.h + .65,
    'text-anchor': 'middle', 'font-size': '.3',
    fill: '#ffcc44', 'font-family': 'Courier New',
    'fill-opacity': '.45', 'pointer-events': 'none',
  });
  dimEl.textContent = `${item.w} m`;
  g.appendChild(dimEl);

  // Hit area: captura eventos en todo el bounding box del item
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: 'none', 'pointer-events': 'all',
  }));

  if (sel) {
    g.appendChild(el('rect', {
      x: -.15, y: -.15, width: item.w + .3, height: item.h + .3,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      rx: '.12', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none',
    }));
    for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: cx-.22, y: cy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── BEBEDERO ─────────────────────────────────────────────
function drawBebedero(g, item, sel) {
  const brd = 0.07;
  const iX  = brd, iY = brd;
  const iW  = item.w - brd * 2;
  const iH  = item.h - brd * 2;

  // Cold light bloom (más visible en modo noche)
  g.appendChild(el('ellipse', {
    cx: item.w / 2, cy: item.h * .5,
    rx: item.w / 2 + .55, ry: .95,
    fill: '#48c0ff',
    filter: 'url(#filter-led-bloom)',
    'pointer-events': 'none',
    class: 'led-bloom',
  }));

  // Drop shadow
  g.appendChild(el('rect', {
    x: .03, y: .04, width: item.w, height: item.h,
    fill: '#000', 'fill-opacity': '.35', rx: '.06',
    'pointer-events': 'none',
  }));

  // Outer steel trough frame
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: '#6a4428', stroke: '#2c1a08', 'stroke-width': '.04', rx: '.06',
  }));
  // Frame top rim highlight
  g.appendChild(el('rect', {
    x: .01, y: .01, width: item.w - .02, height: brd * .5,
    fill: '#9a6838', 'fill-opacity': '.55', rx: '.04',
    'pointer-events': 'none',
  }));
  // Frame bottom shadow
  g.appendChild(el('rect', {
    x: .01, y: item.h - brd * .4, width: item.w - .02, height: brd * .4,
    fill: '#1a0c04', 'fill-opacity': '.4', rx: '.03',
    'pointer-events': 'none',
  }));

  // Ice/water base fill (static dark blue)
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: '#2a90d0', rx: '.03', 'pointer-events': 'none',
  }));
  // Ice shimmer overlay (animated lighter blue)
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: '#80d0ff', rx: '.03',
    class: 'beb-shimmer', 'pointer-events': 'none',
  }));
  // Surface top reflection
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH * .32,
    fill: '#c8ecff', 'fill-opacity': '.45', rx: '.03',
    'pointer-events': 'none',
  }));

  // Beer can tops (2 rows, spaced proportionally)
  const canR  = Math.min(.055, iH * .3);
  const nCans = Math.max(4, Math.round(iW / .2));
  const canSp = iW / nCans;
  for (let i = 0; i < nCans; i++) {
    const cx    = iX + (i + .5) * canSp;
    const dly   = ((i * .17) % 4).toFixed(2);
    for (const ry of [.28, .72]) {
      const cy = iY + ry * iH;
      // Can body (aluminum top view)
      g.appendChild(el('circle', {
        cx, cy, r: canR,
        fill: '#c8a830', stroke: '#907018', 'stroke-width': '.01',
        'fill-opacity': '.9', 'pointer-events': 'none',
        class: 'beb-can', style: `animation-delay:${dly}s`,
      }));
      // Can ring/tab
      g.appendChild(el('circle', {
        cx, cy: cy - canR * .22, r: canR * .32,
        fill: '#a09050', 'pointer-events': 'none',
      }));
    }
  }

  // Section dividers (trough has 3 compartments)
  for (let d = 1; d <= 2; d++) {
    g.appendChild(el('rect', {
      x: item.w * (d / 3) - .025, y: 0,
      width: .05, height: item.h,
      fill: '#2c1a08', 'pointer-events': 'none',
    }));
  }

  // Ice crystal sparkles
  const sparks = [
    [.06,.45],[.17,.22],[.28,.78],[.39,.38],[.5,.62],
    [.61,.28],[.72,.72],[.83,.42],[.94,.58],
  ];
  for (const [fx, fy] of sparks) {
    const delay = ((fx * 4.1 + fy * 2.3) % 3.2).toFixed(2);
    // 4-point star sparkle (cross of two small rects)
    const cx = iX + fx * iW;
    const cy = iY + fy * iH;
    g.appendChild(el('line', {
      x1: cx - .045, y1: cy, x2: cx + .045, y2: cy,
      stroke: '#fff', 'stroke-width': '.022',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('line', {
      x1: cx, y1: cy - .045, x2: cx, y2: cy + .045,
      stroke: '#fff', 'stroke-width': '.022',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    // Diagonal arms (for 8-point star effect)
    g.appendChild(el('line', {
      x1: cx - .028, y1: cy - .028, x2: cx + .028, y2: cy + .028,
      stroke: '#c8eeff', 'stroke-width': '.013',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('line', {
      x1: cx + .028, y1: cy - .028, x2: cx - .028, y2: cy + .028,
      stroke: '#c8eeff', 'stroke-width': '.013',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
  }

  // Cold glow filter on the inner area
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: 'none', rx: '.03',
    filter: 'url(#filter-cold)',
    'pointer-events': 'none',
  }));

  // Label (below trough)
  const lblEl = el('text', {
    x: item.w / 2, y: item.h + .36,
    'text-anchor': 'middle', 'font-size': '.38',
    fill: '#4aacdc', 'font-family': 'Courier New',
    'fill-opacity': '.9', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  const dimEl = el('text', {
    x: item.w / 2, y: item.h + .62,
    'text-anchor': 'middle', 'font-size': '.29',
    fill: '#4aacdc', 'font-family': 'Courier New',
    'fill-opacity': '.5', 'pointer-events': 'none',
  });
  dimEl.textContent = `${item.w} × ${item.h} m · cervezas & hielo`;
  g.appendChild(dimEl);

  // Hit area: captura eventos en todo el bounding box del item
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: 'none', 'pointer-events': 'all',
  }));

  // Selection highlight
  if (sel) {
    g.appendChild(el('rect', {
      x: -.14, y: -.14, width: item.w + .28, height: item.h + .28,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      rx: '.1', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none',
    }));
    for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: cx-.22, y: cy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── REFLECTOR ────────────────────────────────────────────
function drawReflector(g, item, sel) {
  const cx = item.w / 2;
  const cy = item.h / 2;
  const fr = Math.min(item.w, item.h) * .44; // radio del fixture
  const lr = Math.max(item.w, item.h) * 5.5; // radio del cono de luz

  // Cono de luz (grande, va "hacia afuera") — muy visible en modo noche
  g.appendChild(el('circle', {
    cx, cy, r: lr,
    fill: '#fffce0', 'fill-opacity': '1',
    filter: 'url(#filter-reflector-beam)',
    'pointer-events': 'none',
    class: 'reflector-beam',
  }));

  // Drop shadow del fixture
  g.appendChild(el('circle', {
    cx: cx + fr * .18, cy: cy + fr * .22, r: fr,
    fill: '#000', 'fill-opacity': '.35',
    'pointer-events': 'none',
  }));
  // Cuerpo del fixture (carcasa negra)
  g.appendChild(el('circle', {
    cx, cy, r: fr,
    fill: '#1e1e1e', stroke: '#505050', 'stroke-width': '.035',
  }));
  // Aro exterior cromado
  g.appendChild(el('circle', {
    cx, cy, r: fr * .88,
    fill: 'none', stroke: '#888878', 'stroke-width': '.025',
    'pointer-events': 'none',
  }));
  // Lente / reflector interior
  g.appendChild(el('circle', {
    cx, cy, r: fr * .62,
    fill: '#d8d4a0', stroke: '#b8b480', 'stroke-width': '.02',
    'pointer-events': 'none',
  }));
  // Centro brillante (filamento/LED)
  g.appendChild(el('circle', {
    cx, cy, r: fr * .28,
    fill: '#f8f8e8',
    filter: 'url(#filter-led)',
    'pointer-events': 'none',
    class: 'led-bulb',
    style: 'animation-duration:5s',
  }));
  // Tornillos de montaje (4 puntos en la carcasa)
  for (const [dx, dy] of [[.7,.7],[-.7,.7],[.7,-.7],[-.7,-.7]]) {
    g.appendChild(el('circle', {
      cx: cx + fr * dx * .75, cy: cy + fr * dy * .75, r: fr * .08,
      fill: '#444', 'pointer-events': 'none',
    }));
  }

  // Label
  const lblEl = el('text', {
    x: cx, y: item.h + .36,
    'text-anchor': 'middle', 'font-size': '.35',
    fill: '#c8c490', 'font-family': 'Courier New',
    'fill-opacity': '.85', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  // Hit area
  g.appendChild(el('circle', {
    cx, cy, r: fr + .15,
    fill: 'none', 'pointer-events': 'all',
  }));

  // Selection
  if (sel) {
    g.appendChild(el('circle', {
      cx, cy, r: fr + .2,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      'stroke-dasharray': '.28,.18', 'pointer-events': 'none',
    }));
    for (const [hx, hy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: hx-.22, y: hy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── LIGHT LAYER ──────────────────────────────────────────
function rebuildLightLayer() {
  const ll = document.getElementById('light-layer');
  ll.innerHTML = '';
  for (const item of S.items) {
    let fill = null, r = 0;
    const cx = item.x + item.w/2, cy = item.y + item.h/2;
    if (item.type === 'bombita')  { fill='#ffd060'; r=item.w/2+.8; }
    else if (item.type === 'reflector') { fill='#fffce0'; r=Math.max(item.w,item.h)*4.5; }
    else if (item.type === 'bebedero')  { fill='#40b0ff'; r=item.w/2+1.0; }
    else if (item.type === 'pista' && item.lightsOn) { fill='#ffe0a0'; r=Math.max(item.w,item.h)*.8; }
    else if (item.type === 'sanitario') { fill='#ffc040'; r=item.w/2*.55; }
    else if (item.type === 'cuina')     { fill='#ff8820'; r=item.w/2*.9; }
    else if (item.type === 'vela')      { fill='#ff9010'; r=Math.min(item.w,item.h)*3.5; }
    if (!fill) continue;
    ll.appendChild(el('circle', { cx, cy, r, fill, 'fill-opacity':'1', filter:'url(#filter-ambient)', class:'night-bloom' }));
  }
}

// ─── CUINA CATERING ───────────────────────────────────────
function makeSMIL(attr, values, dur, begin) {
  const a = document.createElementNS(NS, 'animate');
  a.setAttribute('attributeName', attr);
  a.setAttribute('values', values);
  a.setAttribute('dur', dur);
  a.setAttribute('begin', begin || '0s');
  a.setAttribute('repeatCount', 'indefinite');
  return a;
}

function drawCuina(g, item, sel) {
  const w = item.w, h = item.h;
  const tw = Math.min(.7, Math.max(.5, h * .09));

  // Sombra
  g.appendChild(el('rect', { x:.05, y:.06, width:w, height:h, fill:'#000', 'fill-opacity':'.18', rx:'.07', 'pointer-events':'none' }));
  // Piso exterior (marco) — grass color
  g.appendChild(el('rect', { x:0, y:0, width:w, height:h, fill:'#2e4e12', rx:'.06' }));
  // Piso interior — pasto igual que el mapa (usa el filtro grass-2 para textura)
  g.appendChild(el('rect', { x:tw, y:tw, width:w-tw*2, height:h-tw*2, fill:'#3a5a18', filter:'url(#filter-grass-2)', 'fill-opacity':'.9' }));

  // ── MESAS PERIMETRALES (mantel negro) ──
  const sides = [[0,0,w,tw],[0,h-tw,w,tw],[0,tw,tw,h-tw*2],[w-tw,tw,tw,h-tw*2]];
  for (const [sx,sy,sw,sh] of sides) {
    g.appendChild(el('rect', { x:sx, y:sy, width:sw, height:sh, fill:'#141414', stroke:'#303030', 'stroke-width':'.025', rx:'.03' }));
    g.appendChild(el('rect', { x:sx+.035, y:sy+.035, width:sw-.07, height:sh-.07, fill:'none', stroke:'#2a2a2a', 'stroke-width':'.015', 'pointer-events':'none' }));
  }

  // Verduras/deco sobre mesas
  const decos = [[.25,tw*.55,'#c84020'],[.6,tw*.45,'#e8a820'],[1.0,tw*.55,'#88a028'],
    [1.45,tw*.5,'#c85820'],[2.0,tw*.48,'#d09030'],[w-.3,h-tw*.5,'#c84020'],
    [w-.75,h-tw*.52,'#88a028'],[w-1.2,h-tw*.5,'#e8a820'],[w-1.7,h-tw*.55,'#c85820']];
  for (const [dx,dy,dc] of decos) {
    if (dx>0&&dx<w&&dy>0&&dy<h)
      g.appendChild(el('circle', { cx:dx, cy:dy, r:'.11', fill:dc, 'fill-opacity':'.88', 'pointer-events':'none' }));
  }

  // ── ESTRUCTURA COLGANTE (rack de hierro) ──
  const rx0=tw+.3, ry0=tw+.18, rw=w-tw*2-.6, rh=1.1;
  g.appendChild(el('rect', { x:rx0, y:ry0, width:rw, height:rh, fill:'none', stroke:'#282820', 'stroke-width':'.07', rx:'.04', 'pointer-events':'none' }));
  const bars = Math.round(rw/.8);
  for (let i=1;i<bars;i++) g.appendChild(el('line', { x1:rx0+i*rw/bars, y1:ry0, x2:rx0+i*rw/bars, y2:ry0+rh, stroke:'#282820', 'stroke-width':'.04', 'pointer-events':'none' }));
  // Items colgando
  for (let i=0;i<bars+1;i++) {
    const hx=rx0+(i+.5)*rw/(bars+1);
    g.appendChild(el('ellipse', { cx:hx, cy:ry0+rh*.5, rx:'.07', ry:'.14', fill:'#a07830', 'fill-opacity':'.85', 'pointer-events':'none' }));
  }

  // ── PARRILLA / PLANCHA ──
  const gx=tw+.4, gy=h-tw-.8, gw=w-tw*2-.8, gh=.5;
  g.appendChild(el('rect', { x:gx, y:gy, width:gw, height:gh, fill:'#1c1c1c', stroke:'#383838', 'stroke-width':'.03', rx:'.04', 'pointer-events':'none' }));
  for (let i=1;i<7;i++) g.appendChild(el('line', { x1:gx+i*gw/7, y1:gy, x2:gx+i*gw/7, y2:gy+gh, stroke:'#333', 'stroke-width':'.02', 'pointer-events':'none' }));

  // ── FUEGOS ──
  const fires = [
    [tw+.7, h*.48],[tw+1.8, h*.62],[tw+3.0, h*.5],
    [w-tw-2.8,h*.55],[w-tw-1.5,h*.44],[w-tw-.8,h*.6],
  ].filter(([fx,fy])=>fx>tw+.3&&fx<w-tw-.3&&fy>tw+.3&&fy<h-tw-.3);
  for (const [fx,fy] of fires) {
    // Brasas
    g.appendChild(el('circle', { cx:fx, cy:fy, r:'.26', fill:'#4a1808', 'pointer-events':'none' }));
    // Llama animada
    const flame = el('circle', { cx:fx, cy:fy, r:'.17', fill:'#ff6010', 'pointer-events':'none' });
    flame.appendChild(makeSMIL('r', '.13;.21;.15;.19;.13', '.85s', '0s'));
    flame.appendChild(makeSMIL('fill', '#ff6010;#ffa030;#ff4008;#ff8820;#ff6010', '.85s', '0s'));
    g.appendChild(flame);
    // Punta amarilla
    const tip = el('circle', { cx:fx, cy:fy-.13, r:'.09', fill:'#ffcc28', 'fill-opacity':'.85', 'pointer-events':'none' });
    tip.appendChild(makeSMIL('r', '.07;.12;.08;.11;.07', '.7s', '.15s'));
    tip.appendChild(makeSMIL('cy', `${fy-.13};${fy-.18};${fy-.12};${fy-.16};${fy-.13}`, '.7s', '.15s'));
    g.appendChild(tip);
    // Bloom de fuego (calor/luz)
    g.appendChild(el('circle', { cx:fx, cy:fy, r:'.75', fill:'#ff8818', 'fill-opacity':'1', filter:'url(#filter-led-bloom)', 'pointer-events':'none', class:'led-bloom' }));
    // Humo (3 puffs por fuego)
    for (let p=0;p<5;p++) {
      const sx=fx+(p-.2)*.14, sy=fy, delay=`${p*.9}s`;
      const puff = el('circle', { cx:sx, cy:sy, r:'.09', fill:'#b0b0a8', 'fill-opacity':'.38', 'pointer-events':'none' });
      puff.appendChild(makeSMIL('cx', `${sx};${sx-.25}`, '3.8s', delay));
      puff.appendChild(makeSMIL('cy', `${sy};${sy-1.6}`, '3.8s', delay));
      puff.appendChild(makeSMIL('r', '.08;.42', '3.8s', delay));
      puff.appendChild(makeSMIL('opacity', '.4;0', '3.8s', delay));
      g.appendChild(puff);
    }
  }

  // ── PERSONAS (chefs moviéndose) ──
  const personPos = [[tw+.45,h*.45],[w*.52,h-tw-.45],[w-tw-.5,h*.5],[w*.28,tw+.45]].filter(([px,py])=>px>tw&&px<w-tw&&py>tw&&py<h-tw);
  const pColors = ['#c8a880','#d4b890','#b89870','#c0a07a'];
  for (let i=0;i<personPos.length;i++) {
    const [px,py]=personPos[i], d=`${i*.85}s`, dur=`${2.6+i*.4}s`;
    const p = el('circle', { cx:px, cy:py, r:'.13', fill:pColors[i%pColors.length], 'pointer-events':'none' });
    p.appendChild(makeSMIL('cx', `${px};${px+.1};${px};${px-.09};${px}`, dur, d));
    p.appendChild(makeSMIL('cy', `${py};${py-.06};${py+.09};${py-.03};${py}`, dur, d));
    g.appendChild(p);
    // gorro
    g.appendChild(el('circle', { cx:px, cy:py-.1, r:'.07', fill:'#e8e8e0', 'pointer-events':'none' }));
  }

  // ── LABEL ──
  const lbl = el('text', { x:w/2, y:h+.38, 'text-anchor':'middle', 'font-size':'.38', fill:'#c8a040', 'font-family':'Courier New', 'fill-opacity':'.88', 'pointer-events':'none' });
  lbl.textContent = item.label;
  g.appendChild(lbl);
  const dim = el('text', { x:w/2, y:h+.64, 'text-anchor':'middle', 'font-size':'.29', fill:'#c8a040', 'font-family':'Courier New', 'fill-opacity':'.5', 'pointer-events':'none' });
  dim.textContent = `${w} × ${h} m`;
  g.appendChild(dim);

  // ── HIT + SEL ──
  g.appendChild(el('rect', { x:0, y:0, width:w, height:h, fill:'none', 'pointer-events':'all' }));
  if (sel) {
    g.appendChild(el('rect', { x:-.12, y:-.12, width:w+.24, height:h+.24, fill:'none', stroke:'#fff', 'stroke-width':'.1', rx:'.1', 'stroke-dasharray':'.32,.2', 'pointer-events':'none' }));
    for (const [cx,cy] of [[0,0],[w,0],[0,h],[w,h]])
      g.appendChild(el('rect', { x:cx-.22, y:cy-.22, width:.44, height:.44, fill:'#fff', stroke:'#4a4a4a', 'stroke-width':'.06', rx:'.08', 'pointer-events':'none' }));
  }
}

// ─── LIVING FARDOS ────────────────────────────────────────
function drawLivingFardos(g, item, sel) {
  const w = item.w, h = item.h;
  const cx = w/2, cy = h/2;
  const sD  = Math.min(w, h) * .19;
  const sWH = Math.min(w * .68, h * .8);
  const sWV = Math.min(h * .68, w * .8);
  const bR  = sD * .44; // radio de un fardo individual

  // Sombra
  g.appendChild(el('rect', { x:.04, y:.05, width:w, height:h, fill:'#000', 'fill-opacity':'.15', rx:'.08', 'pointer-events':'none' }));

  // Función auxiliar: dibuja un fardo redondo
  function bale(bcx, bcy) {
    g.appendChild(el('circle', { cx:bcx, cy:bcy, r:bR, fill:'#bdb47e', stroke:'#9c9468', 'stroke-width':'.03' }));
    g.appendChild(el('circle', { cx:bcx, cy:bcy, r:bR*.66, fill:'none', stroke:'#cec994', 'stroke-width':'.022' }));
    g.appendChild(el('circle', { cx:bcx, cy:bcy, r:bR*.34, fill:'#d8d4a8', 'fill-opacity':'.75' }));
    for (let a=0;a<6;a++) {
      const rad=a*Math.PI/3;
      g.appendChild(el('line', {
        x1:(bcx+Math.cos(rad)*bR*.28).toFixed(2), y1:(bcy+Math.sin(rad)*bR*.28).toFixed(2),
        x2:(bcx+Math.cos(rad)*bR*.88).toFixed(2), y2:(bcy+Math.sin(rad)*bR*.88).toFixed(2),
        stroke:'#a89e6e', 'stroke-width':'.011', 'pointer-events':'none',
      }));
    }
  }

  // ── 4 FARDOS (uno por lado, como sofás) ──
  // Norte: fila de fardos
  const nBalesH = Math.max(2, Math.round(sWH / (bR*2.1)));
  const nSpH = sWH / nBalesH;
  for (let i=0; i<nBalesH; i++) bale(cx - sWH/2 + (i+.5)*nSpH, bR*1.02);
  // Sur
  for (let i=0; i<nBalesH; i++) bale(cx - sWH/2 + (i+.5)*nSpH, h - bR*1.02);
  // Oeste
  const nBalesV = Math.max(2, Math.round(sWV / (bR*2.1)));
  const nSpV = sWV / nBalesV;
  for (let i=0; i<nBalesV; i++) bale(bR*1.02, cy - sWV/2 + (i+.5)*nSpV);
  // Este
  for (let i=0; i<nBalesV; i++) bale(w - bR*1.02, cy - sWV/2 + (i+.5)*nSpV);

  // ── MESA DE MADERA central ──
  const tW = sWH * .32, tH = sWV * .28;
  g.appendChild(el('rect', { x:cx-tW/2+.04, y:cy-tH/2+.05, width:tW, height:tH, fill:'#000', 'fill-opacity':'.18', rx:'.07', 'pointer-events':'none' }));
  g.appendChild(el('rect', { x:cx-tW/2, y:cy-tH/2, width:tW, height:tH, fill:'#9a5c22', stroke:'#6a3c10', 'stroke-width':'.028', rx:'.07' }));
  // Veta de madera
  g.appendChild(el('rect', { x:cx-tW/2+.04, y:cy-tH/2+.03, width:tW-.08, height:tH*.32, fill:'#b87030', 'fill-opacity':'.4', rx:'.04', 'pointer-events':'none' }));
  g.appendChild(el('rect', { x:cx-tW/2, y:cy-tH/2, width:tW, height:tH*.08, fill:'#c07830', 'fill-opacity':'.35', rx:'.07', 'pointer-events':'none' }));

  // Label
  const lbl = el('text', { x:cx, y:h+.36, 'text-anchor':'middle', 'font-size':'.34', fill:'#bdb47e', 'font-family':'Courier New', 'fill-opacity':'.9', 'pointer-events':'none' });
  lbl.textContent = item.label;
  g.appendChild(lbl);
  const dim = el('text', { x:cx, y:h+.58, 'text-anchor':'middle', 'font-size':'.26', fill:'#bdb47e', 'font-family':'Courier New', 'fill-opacity':'.5', 'pointer-events':'none' });
  dim.textContent = `${w} × ${h} m`;
  g.appendChild(dim);

  g.appendChild(el('rect', { x:0, y:0, width:w, height:h, fill:'none', 'pointer-events':'all' }));
  if (sel) {
    g.appendChild(el('rect', { x:-.12, y:-.12, width:w+.24, height:h+.24, fill:'none', stroke:'#fff', 'stroke-width':'.1', rx:'.1', 'stroke-dasharray':'.32,.2', 'pointer-events':'none' }));
    for (const [hx,hy] of [[0,0],[w,0],[0,h],[w,h]])
      g.appendChild(el('rect', { x:hx-.22, y:hy-.22, width:.44, height:.44, fill:'#fff', stroke:'#4a4a4a', 'stroke-width':'.06', rx:'.08', 'pointer-events':'none' }));
  }
}

// ─── BAÑO VIP · Módulo Sanitario 5 compartimentos ─────────
// Medidas: Largo 4.5m (habitáculo) + 2m (lanza) · Ancho 2.5m + 1.5m (escaleras) · Alto 3.1m
// Superficie total: 6.5 × 4 m
function drawSanitario(g, item, sel) {
  const w = item.w, h = item.h;

  // Proporciones según plano técnico del PDF:
  //   Lanza: 2/6.5 del ancho total
  //   Habitáculo: 4.5/6.5 del ancho total
  //   Alto habitáculo: 2.5/4 del alto total
  //   Escaleras: 1.5/4 del alto total (cuelgan hacia abajo)
  const lanzaW  = w * (2   / 6.5);
  const bodyW   = w * (4.5 / 6.5);
  const bodyH   = h * (2.5 / 4);
  const bodyX   = lanzaW;
  const bodyY   = 0;
  const stairsH = h * (1.5 / 4);
  const stairsY = bodyH;
  const compW   = bodyW / 5;

  // ── SOMBRA GENERAL ──
  g.appendChild(el('rect', {
    x: .07, y: .09, width: w, height: h,
    fill: '#000', 'fill-opacity': '.28', rx: '.12', 'pointer-events': 'none',
  }));

  // ── LANZA (enganche del trailer) ──
  const lanzaThick = bodyH * .16;
  const lanzaY     = bodyH / 2 - lanzaThick / 2;
  // Cuerpo de la lanza
  g.appendChild(el('rect', {
    x: 0, y: lanzaY, width: lanzaW + .04, height: lanzaThick,
    fill: '#484848', stroke: '#2a2a2a', 'stroke-width': '.03', rx: '.04',
  }));
  g.appendChild(el('rect', {
    x: .04, y: lanzaY + .02, width: lanzaW - .06, height: lanzaThick * .32,
    fill: '#707070', 'fill-opacity': '.55', rx: '.03', 'pointer-events': 'none',
  }));
  // Gancho (enganche esférico)
  g.appendChild(el('circle', {
    cx: .14, cy: bodyH / 2, r: lanzaThick * .44,
    fill: '#303030', stroke: '#1a1a1a', 'stroke-width': '.025',
  }));
  g.appendChild(el('circle', {
    cx: .14, cy: bodyH / 2, r: lanzaThick * .18,
    fill: '#606060', 'pointer-events': 'none',
  }));

  // ── CUERPO PRINCIPAL DEL HABITÁCULO ──
  // Base oscura (borde grueso charcoal)
  g.appendChild(el('rect', {
    x: bodyX, y: bodyY, width: bodyW, height: bodyH,
    fill: '#2e2e2e', rx: '.08',
  }));
  // Superficie blanca principal
  g.appendChild(el('rect', {
    x: bodyX + .05, y: bodyY + .05, width: bodyW - .1, height: bodyH - .1,
    fill: '#f2f0ec', stroke: '#3a3a3a', 'stroke-width': '.055', rx: '.06',
  }));
  // Reflejo/brillo superior
  g.appendChild(el('rect', {
    x: bodyX + .09, y: bodyY + .07, width: bodyW - .18, height: bodyH * .16,
    fill: '#fff', 'fill-opacity': '.48', rx: '.04', 'pointer-events': 'none',
  }));
  // Trim de esquinas (chaflán charcoal oscuro)
  const tW = bodyW * .055, tH = bodyH * .11;
  for (const [tx, ty] of [
    [bodyX + .05, bodyY + .05],
    [bodyX + bodyW - .05 - tW, bodyY + .05],
    [bodyX + .05, bodyY + bodyH - .05 - tH],
    [bodyX + bodyW - .05 - tW, bodyY + bodyH - .05 - tH],
  ]) {
    g.appendChild(el('rect', {
      x: tx, y: ty, width: tW, height: tH,
      fill: '#2e2e2e', rx: '.025', 'pointer-events': 'none',
    }));
  }

  // ── DIVISORES DE COMPARTIMENTOS (5 espacios) ──
  for (let i = 1; i < 5; i++) {
    const dx = bodyX + .05 + (bodyW - .1) * i / 5;
    g.appendChild(el('line', {
      x1: dx, y1: bodyY + .05, x2: dx, y2: bodyY + bodyH - .05,
      stroke: '#4a4a4a', 'stroke-width': '.045', 'pointer-events': 'none',
    }));
  }

  // ── PUERTAS (arcos de apertura) ──
  for (let i = 0; i < 5; i++) {
    const doorCx = bodyX + .05 + compW * i;
    const doorCy = bodyY + bodyH - .08;
    const doorR  = Math.min(compW * .55, bodyH * .32);
    // Arco de puerta (indica apertura)
    g.appendChild(el('path', {
      d: `M ${doorCx} ${doorCy} A ${doorR} ${doorR} 0 0 1 ${doorCx + doorR} ${doorCy - doorR}`,
      fill: 'none', stroke: '#999', 'stroke-width': '.018',
      'pointer-events': 'none',
    }));
    // Línea de la puerta
    g.appendChild(el('line', {
      x1: doorCx, y1: doorCy - doorR,
      x2: doorCx, y2: doorCy,
      stroke: '#999', 'stroke-width': '.018', 'pointer-events': 'none',
    }));
  }

  // ── ÍCONOS DE GÉNERO ──
  // Compartimentos 0,1,2 → Damas; 3,4 → Caballeros
  const iconY  = bodyY + bodyH * .4;
  const iconFs = Math.min(compW * .55, bodyH * .25);
  for (let i = 0; i < 5; i++) {
    const icx  = bodyX + .05 + compW * (i + .5);
    const isFemale = i < 3;
    // Cabeza
    g.appendChild(el('circle', {
      cx: icx, cy: iconY - iconFs * .48, r: iconFs * .16,
      fill: '#333', 'pointer-events': 'none',
    }));
    if (isFemale) {
      // Falda (triángulo)
      g.appendChild(el('polygon', {
        points: `${icx},${iconY - iconFs * .3} ${icx - iconFs * .22},${iconY + iconFs * .28} ${icx + iconFs * .22},${iconY + iconFs * .28}`,
        fill: '#333', 'pointer-events': 'none',
      }));
    } else {
      // Cuerpo rectangular (masculino)
      g.appendChild(el('rect', {
        x: icx - iconFs * .16, y: iconY - iconFs * .3,
        width: iconFs * .32, height: iconFs * .5,
        fill: '#333', rx: '.02', 'pointer-events': 'none',
      }));
    }
  }

  // ── TEXTO "BAÑOS VIP" ──
  const bvTxt = el('text', {
    x: bodyX + bodyW / 2, y: bodyY + bodyH * .82,
    'text-anchor': 'middle', 'font-size': (bodyH * .085).toFixed(3),
    fill: '#555', 'font-family': 'Courier New',
    'fill-opacity': '.7', 'letter-spacing': '.06em',
    'pointer-events': 'none',
  });
  bvTxt.textContent = '— BAÑOS VIP —';
  g.appendChild(bvTxt);

  // ── LUCES COLGANTES TIPO RATÁN (3 lámparas sobre el habitáculo) ──
  const nLamps = 3;
  for (let i = 0; i < nLamps; i++) {
    const lx    = bodyX + bodyW * (i + 1) / (nLamps + 1);
    const ly    = bodyY + bodyH * .24;
    const lR    = Math.min(compW * .28, bodyH * .13);
    const delay = `${(i * .38).toFixed(2)}s`;

    // Glow cálido (visible en modo noche)
    g.appendChild(el('circle', {
      cx: lx, cy: ly, r: lR * 4.5,
      fill: '#ffc040', 'fill-opacity': '1',
      filter: 'url(#filter-led-bloom)',
      'pointer-events': 'none',
      class: 'led-strip-bloom',
      style: `animation-delay:${delay}`,
    }));
    // Pantalla exterior ratán (marrón cálido)
    g.appendChild(el('circle', {
      cx: lx, cy: ly, r: lR,
      fill: '#8a5a18', stroke: '#4a2e08', 'stroke-width': '.025',
      'pointer-events': 'none',
    }));
    // Trama ratán (líneas radiales)
    for (let r = 0; r < 8; r++) {
      const angle = r * Math.PI / 4;
      const r1 = lR * .3, r2 = lR * .9;
      g.appendChild(el('line', {
        x1: (lx + Math.cos(angle) * r1).toFixed(3),
        y1: (ly + Math.sin(angle) * r1).toFixed(3),
        x2: (lx + Math.cos(angle) * r2).toFixed(3),
        y2: (ly + Math.sin(angle) * r2).toFixed(3),
        stroke: '#5a3208', 'stroke-width': '.015',
        'pointer-events': 'none',
      }));
    }
    // Anillo interior de la pantalla
    g.appendChild(el('circle', {
      cx: lx, cy: ly, r: lR * .52,
      fill: '#f0a820', 'fill-opacity': '.88',
      filter: 'url(#filter-led)',
      'pointer-events': 'none',
      class: 'led-bulb',
      style: `animation-delay:${delay}`,
    }));
    // Núcleo brillante
    g.appendChild(el('circle', {
      cx: lx, cy: ly, r: lR * .22,
      fill: '#fff8d0', 'fill-opacity': '.95',
      'pointer-events': 'none',
    }));
  }

  // ── ESCALERAS (lateral, 3 peldaños) ──
  const nSteps  = 3;
  const stepH   = stairsH / nSteps;
  const shadowC = ['#b8b8b4', '#c8c8c4', '#d8d8d4'];
  for (let i = 0; i < nSteps; i++) {
    const sY   = stairsY + i * stepH;
    const sX   = bodyX + bodyW * (i * .05);
    const sW   = bodyW * (1 - i * .05);
    g.appendChild(el('rect', {
      x: sX + .03, y: sY + .03, width: sW, height: stepH,
      fill: '#000', 'fill-opacity': '.18', rx: '.03', 'pointer-events': 'none',
    }));
    g.appendChild(el('rect', {
      x: sX, y: sY, width: sW, height: stepH,
      fill: shadowC[i], stroke: '#909090', 'stroke-width': '.025', rx: '.03',
    }));
    // Borde de peldaño (antideslizante)
    g.appendChild(el('line', {
      x1: sX + .04, y1: sY + .03,
      x2: sX + sW - .04, y2: sY + .03,
      stroke: '#fff', 'stroke-width': '.022', 'stroke-opacity': '.6',
      'pointer-events': 'none',
    }));
    // Pasamano central (línea a lo largo)
    g.appendChild(el('line', {
      x1: sX, y1: sY + stepH / 2,
      x2: sX + sW, y2: sY + stepH / 2,
      stroke: '#888', 'stroke-width': '.012', 'stroke-dasharray': '.06,.06',
      'pointer-events': 'none',
    }));
  }

  // ── RUEDAS DEL TRAILER (vista superior) ──
  const whlR = bodyH * .065;
  for (const wy of [bodyY + bodyH * .22, bodyY + bodyH * .70]) {
    // Rueda (oval vista de arriba)
    g.appendChild(el('ellipse', {
      cx: bodyX + bodyW - whlR * .5, cy: wy,
      rx: whlR * .42, ry: whlR,
      fill: '#161616', stroke: '#2a2a2a', 'stroke-width': '.018',
      'pointer-events': 'none',
    }));
    // Aro
    g.appendChild(el('ellipse', {
      cx: bodyX + bodyW - whlR * .5, cy: wy,
      rx: whlR * .22, ry: whlR * .52,
      fill: '#484848', 'pointer-events': 'none',
    }));
  }

  // ── LABEL Y DIMENSIONES ──
  const lbl = el('text', {
    x: w / 2, y: h + .38,
    'text-anchor': 'middle', 'font-size': '.38',
    fill: '#d4a870', 'font-family': 'Courier New',
    'fill-opacity': '.92', 'pointer-events': 'none',
  });
  lbl.textContent = item.label;
  g.appendChild(lbl);

  const dim = el('text', {
    x: w / 2, y: h + .62,
    'text-anchor': 'middle', 'font-size': '.28',
    fill: '#d4a870', 'font-family': 'Courier New',
    'fill-opacity': '.52', 'pointer-events': 'none',
  });
  dim.textContent = `6.5 × 4 m · Baño VIP · hasta 200 pers`;
  g.appendChild(dim);

  // Hit area
  g.appendChild(el('rect', {
    x: 0, y: 0, width: w, height: h,
    fill: 'none', 'pointer-events': 'all',
  }));

  if (sel) {
    g.appendChild(el('rect', {
      x: -.12, y: -.12, width: w + .24, height: h + .24,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      rx: '.1', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none',
    }));
    for (const [hx, hy] of [[0,0],[w,0],[0,h],[w,h]])
      g.appendChild(el('rect', {
        x: hx-.22, y: hy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
  }
}

// ─── VELA DE PISO ─────────────────────────────────────────
function drawVela(g, item, sel) {
  const s  = Math.min(item.w, item.h);
  const cx = item.w / 2, cy = item.h / 2;
  const r  = s * .44;  // radio de la bolsita
  // Offset para que cada vela parpadee en fase diferente
  const phase = `${((item.id || 0) % 9) * .09}s`;

  // ── Bloom de calor (luz cálida de vela, muy visible en noche) ──
  g.appendChild(el('circle', {
    cx, cy, r: r * 9,
    fill: '#ff9010', 'fill-opacity': '1',
    filter: 'url(#filter-led-bloom)',
    'pointer-events': 'none',
    class: 'led-bloom',
  }));

  // Sombra de la bolsita
  g.appendChild(el('rect', {
    x: cx-r+.02, y: cy-r+.025, width: r*2, height: r*2,
    fill: '#000', 'fill-opacity': '.22', rx: r*.14, 'pointer-events': 'none',
  }));

  // ── Bolsita de papel madera ──
  g.appendChild(el('rect', {
    x: cx-r, y: cy-r, width: r*2, height: r*2,
    fill: '#c49848', stroke: '#8a6820', 'stroke-width': '.025', rx: r*.12,
  }));
  // Borde doblado (el pliegue de la bolsa de papel)
  g.appendChild(el('rect', {
    x: cx-r+.015, y: cy-r+.015, width: r*2-.03, height: r*2-.03,
    fill: 'none', stroke: '#d4b060', 'stroke-width': '.015',
    rx: r*.1, 'pointer-events': 'none',
  }));

  // ── Resplandor cálido del papel (la vela ilumina desde adentro) ──
  const glow = el('rect', {
    x: cx-r*.82, y: cy-r*.82, width: r*1.64, height: r*1.64,
    fill: '#ffcc30', 'fill-opacity': '.52', rx: r*.08, 'pointer-events': 'none',
  });
  glow.appendChild(makeSMIL('fill-opacity', '.45;.65;.50;.60;.45', '.7s', phase));
  g.appendChild(glow);

  // ── Llama principal (flickeo orgánico con SMIL) ──
  const flame = el('circle', {
    cx, cy: (cy - r*.08).toFixed(3), r: (r*.3).toFixed(3),
    fill: '#ff8810', 'pointer-events': 'none',
  });
  flame.appendChild(makeSMIL('r',
    `${(r*.26).toFixed(3)};${(r*.36).toFixed(3)};${(r*.28).toFixed(3)};${(r*.33).toFixed(3)};${(r*.26).toFixed(3)}`,
    '.62s', phase));
  flame.appendChild(makeSMIL('fill',
    '#ff8810;#ffb020;#ff7008;#ffa018;#ff8810', '.62s', phase));
  flame.appendChild(makeSMIL('cx',
    `${cx};${(cx+r*.07).toFixed(3)};${cx};${(cx-r*.05).toFixed(3)};${cx}`,
    '.82s', phase));
  g.appendChild(flame);

  // ── Núcleo brillante de la llama (punto blanco-amarillo) ──
  const tip = el('circle', {
    cx, cy: (cy - r*.18).toFixed(3), r: (r*.14).toFixed(3),
    fill: '#fff8c0', 'fill-opacity': '.92', 'pointer-events': 'none',
  });
  tip.appendChild(makeSMIL('r',
    `${(r*.11).toFixed(3)};${(r*.18).toFixed(3)};${(r*.12).toFixed(3)};${(r*.16).toFixed(3)};${(r*.11).toFixed(3)}`,
    '.55s', phase));
  tip.appendChild(makeSMIL('cy',
    `${(cy-r*.18).toFixed(3)};${(cy-r*.24).toFixed(3)};${(cy-r*.16).toFixed(3)};${(cy-r*.22).toFixed(3)};${(cy-r*.18).toFixed(3)}`,
    '.55s', phase));
  tip.appendChild(makeSMIL('cx',
    `${cx};${(cx+r*.04).toFixed(3)};${cx};${(cx-r*.04).toFixed(3)};${cx}`,
    '.75s', phase));
  g.appendChild(tip);

  // Hit area
  g.appendChild(el('circle', {
    cx, cy, r: r + .06, fill: 'none', 'pointer-events': 'all',
  }));

  if (sel) {
    g.appendChild(el('rect', {
      x: cx-r-.1, y: cy-r-.1, width: r*2+.2, height: r*2+.2,
      fill: 'none', stroke: '#fff', 'stroke-width': '.08',
      rx: r*.14, 'stroke-dasharray': '.2,.12', 'pointer-events': 'none',
    }));
    for (const [hx, hy] of [[cx-r, cy-r],[cx+r, cy-r],[cx-r, cy+r],[cx+r, cy+r]])
      g.appendChild(el('rect', { x:hx-.18, y:hy-.18, width:.36, height:.36, fill:'#fff', stroke:'#4a4a4a', 'stroke-width':'.055', rx:'.07', 'pointer-events':'none' }));
  }
}

// ─── TEXTO / REFERENCIA ───────────────────────────────────
function drawTexto(g, item, sel) {
  const fs  = Math.max(.28, Math.min(1.4, item.h * .82));
  // Ancho aproximado (Courier New ≈ 0.56 × fontSize por caracter)
  const tW  = item.label.length * fs * .56;
  const pad = fs * .2;

  // Fondo blanco semitransparente para legibilidad sobre cualquier color
  g.appendChild(el('rect', {
    x: -pad, y: -fs * .78,
    width: tW + pad * 2, height: fs * 1.05,
    fill: '#ffffff', 'fill-opacity': '.82',
    rx: fs * .1, 'pointer-events': 'none',
  }));

  // Texto en negro oscuro
  const txt = el('text', {
    x: 0, y: 0,
    'font-size': fs,
    fill: '#0a0a0a',
    'font-family': 'Courier New',
    'font-weight': 'bold',
    'letter-spacing': '.01em',
    'pointer-events': 'none',
  });
  txt.textContent = item.label;
  g.appendChild(txt);

  // Hit area
  g.appendChild(el('rect', {
    x: -pad, y: -fs * .82,
    width: tW + pad * 2, height: fs * 1.12,
    fill: 'none', 'pointer-events': 'all',
  }));

  // Selección
  if (sel) {
    g.appendChild(el('rect', {
      x: -pad - .08, y: -fs * .88,
      width: tW + pad * 2 + .16, height: fs * 1.24,
      fill: 'none', stroke: '#ffffff', 'stroke-width': '.08',
      rx: fs * .1, 'stroke-dasharray': '.22,.14', 'pointer-events': 'none',
    }));
  }
}

// ─── BARRA DE FARDOS ──────────────────────────────────────
function drawBarra(g, item, sel) {
  const w = item.w, h = item.h;
  // Zona de trabajo: h*0.55 = superficie visible, h*0.45 = frente al público
  const surfH = h * .55;  // la "mesada" de la barra
  const baleH = h * .45;  // los fardos delante

  // Sombra
  g.appendChild(el('rect', { x:.05, y:.06, width:w, height:h, fill:'#000', 'fill-opacity':'.22', rx:'.08', 'pointer-events':'none' }));

  // ── FARDOS REDONDOS DELANTE (vista superior = filas de círculos dorados) ──
  // Los fardos son la "fachada" de la barra, visibles como círculos
  const bR = Math.min(baleH * .44, h * .22); // radio del fardo
  const nBales = Math.max(3, Math.round(w / (bR * 2.2)));
  const bsp = w / nBales;
  for (let i = 0; i < nBales; i++) {
    const bcx = (i+.5) * bsp, bcy = h - bR * 1.05;
    // Fardo base (heno dorado)
    g.appendChild(el('circle', { cx:bcx, cy:bcy, r:bR, fill:'#bdb47e', stroke:'#9c9468', 'stroke-width':'.04' }));
    // Anillos de enrollado
    g.appendChild(el('circle', { cx:bcx, cy:bcy, r:bR*.68, fill:'none', stroke:'#cec994', 'stroke-width':'.025' }));
    g.appendChild(el('circle', { cx:bcx, cy:bcy, r:bR*.35, fill:'#d8d4a8', 'fill-opacity':'.8' }));
    // Radios del heno (rasgos de fibra)
    for (let a=0;a<6;a++) {
      const rad = a*Math.PI/3;
      const x1=(bcx+Math.cos(rad)*bR*.3).toFixed(2), y1=(bcy+Math.sin(rad)*bR*.3).toFixed(2);
      const x2=(bcx+Math.cos(rad)*bR*.88).toFixed(2), y2=(bcy+Math.sin(rad)*bR*.88).toFixed(2);
      g.appendChild(el('line', { x1,y1,x2,y2, stroke:'#a89e6e', 'stroke-width':'.012', 'pointer-events':'none' }));
    }
  }

  // ── SUPERFICIE DE LA BARRA (mesada oscura estilo bar) ──
  g.appendChild(el('rect', { x:0, y:0, width:w, height:surfH, fill:'#1c1810', stroke:'#3a3220', 'stroke-width':'.03', rx:'.06' }));
  // Reflejo de la madera oscura (barniz)
  g.appendChild(el('rect', { x:.03, y:.03, width:w-.06, height:surfH*.3, fill:'#fff', 'fill-opacity':'.06', rx:'.04', 'pointer-events':'none' }));
  // Borde frontal de la mesada (canto visible)
  g.appendChild(el('rect', { x:0, y:surfH-.055, width:w, height:.055, fill:'#403830', 'pointer-events':'none' }));

  // ── FILA DE BOTELLAS en la mesada ──
  const nBottles = Math.round(w / .35);
  for (let i = 0; i < nBottles; i++) {
    const bx = (i+.5)*w/nBottles, by = surfH * .3;
    if (i % 4 === 3) {
      // Cubetera plateada
      g.appendChild(el('circle', { cx:bx, cy:by, r:'.06', fill:'#b4b8bc', stroke:'#888c90', 'stroke-width':'.018' }));
      g.appendChild(el('circle', { cx:bx, cy:by, r:'.032', fill:'#d4d8dc' }));
    } else if (i % 3 === 1) {
      // Copa
      g.appendChild(el('circle', { cx:bx, cy:by, r:'.05', fill:'#cce4f8', 'fill-opacity':'.92', stroke:'#88b8d8', 'stroke-width':'.016' }));
    } else {
      // Botella (elipse vertical oscura)
      g.appendChild(el('ellipse', { cx:bx, cy:by, rx:'.038', ry:'.075', fill:'#1a3810', stroke:'#102808', 'stroke-width':'.014' }));
      // Label de la botella
      g.appendChild(el('ellipse', { cx:bx, cy:by+.01, rx:'.026', ry:'.038', fill:'#e8e0c0', 'fill-opacity':'.5' }));
    }
  }

  // ── BARTENDERS detrás de la mesada ──
  const nStaff = Math.min(3, Math.max(2, Math.round(w / 1.6)));
  const pCols = ['#d4b490','#c8a878','#dabaa0'];
  for (let i = 0; i < nStaff; i++) {
    const sx = w*(i+.5)/nStaff, sy = surfH * .72;
    const p = el('circle', { cx:sx, cy:sy, r:'.115', fill:pCols[i%pCols.length], 'pointer-events':'none' });
    p.appendChild(makeSMIL('cx', `${sx};${sx+.1};${sx};${sx-.08};${sx}`, `${2.2+i*.5}s`, `${i*.6}s`));
    g.appendChild(p);
    // Gorro blanco

  }

  // Label

  dim.textContent = `${w} × ${h} m · fardos`;
