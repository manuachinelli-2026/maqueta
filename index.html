  }
}

// ─── MESA IMPERIAL · 3×1 m · 8 personas (4+4, sin cabeceras) ──
function drawMesaImp(g, item, sel) {
  const W = 3.0, H = 1.0; // FIJAS siempre
  const nC = 4;
  const cW = .40, cH = .30;
  const gap = .07;
  const cFill = '#d4cec0', cBack = '#b8b2a4', cCush = '#e4ddd0';

  // Sombra mesa
  g.appendChild(el('rect', { x:.04, y:.05, width:W, height:H, fill:'#000', 'fill-opacity':'.18', rx:'.07', 'pointer-events':'none' }));
  // Mantel blanco
  g.appendChild(el('rect', { x:0, y:0, width:W, height:H, fill:'#f4f2ec', stroke:'#ccc8b8', 'stroke-width':'.03', rx:'.07' }));
  // Borde interior (doble mantel)
  g.appendChild(el('rect', { x:.055, y:.055, width:W-.11, height:H-.11, fill:'none', stroke:'#dddad0', 'stroke-width':'.018', rx:'.04', 'pointer-events':'none' }));

  // Platos y copas (8 cubiertos: 4 norte + 4 sur)
  for (let i = 0; i < nC; i++) {
    const px = W * (i + 1) / (nC + 1);
    for (const [py, gpY] of [[H*.22, H*.27],[H*.78, H*.73]]) {
      g.appendChild(el('circle', { cx:px, cy:py, r:'.052', fill:'#eae6de', stroke:'#b0aca0', 'stroke-width':'.016', 'pointer-events':'none' }));
      g.appendChild(el('circle', { cx:px+.09, cy:gpY, r:'.03', fill:'#cce4f2', 'fill-opacity':'.88', stroke:'#8ab8d0', 'stroke-width':'.012', 'pointer-events':'none' }));
    }
  }
  // Centro de mesa (arreglo floral mínimo)
  g.appendChild(el('ellipse', { cx:W/2, cy:H/2, rx:'.2', ry:'.12', fill:'#a0c070', 'fill-opacity':'.65', 'pointer-events':'none' }));
  g.appendChild(el('circle', { cx:W/2, cy:H/2, r:'.065', fill:'#c06850', 'fill-opacity':'.75', 'pointer-events':'none' }));

  // ── SILLAS NORTE ──
  for (let i = 0; i < nC; i++) {
    const cx = W * (i + 1) / (nC + 1);
    const sy = -(gap + cH);
    g.appendChild(el('rect', { x:cx-cW/2, y:sy, width:cW, height:cH, fill:cFill, stroke:'#9a9488', 'stroke-width':'.024', rx:'.055' }));
    g.appendChild(el('rect', { x:cx-cW/2, y:sy-cH*.24, width:cW, height:cH*.24, fill:cBack, stroke:'#9a9488', 'stroke-width':'.02', rx:'.04' }));
    g.appendChild(el('rect', { x:cx-cW/2+.03, y:sy+.03, width:cW-.06, height:cH*.72, fill:cCush, rx:'.04', 'pointer-events':'none' }));
  }
  // ── SILLAS SUR ──
  for (let i = 0; i < nC; i++) {
    const cx = W * (i + 1) / (nC + 1);
    const sy = H + gap;
    g.appendChild(el('rect', { x:cx-cW/2, y:sy, width:cW, height:cH, fill:cFill, stroke:'#9a9488', 'stroke-width':'.024', rx:'.055' }));
    g.appendChild(el('rect', { x:cx-cW/2, y:sy+cH*.76, width:cW, height:cH*.24, fill:cBack, stroke:'#9a9488', 'stroke-width':'.02', rx:'.04' }));
    g.appendChild(el('rect', { x:cx-cW/2+.03, y:sy+.03, width:cW-.06, height:cH*.72, fill:cCush, rx:'.04', 'pointer-events':'none' }));
  }

  // Label
  const lbl = el('text', { x:W/2, y:H+gap+cH+.3, 'text-anchor':'middle', 'font-size':'.34', fill:'#b0a890', 'font-family':'Courier New', 'fill-opacity':'.85', 'pointer-events':'none' });
  lbl.textContent = item.label;
  g.appendChild(lbl);
  const dim = el('text', { x:W/2, y:H+gap+cH+.52, 'text-anchor':'middle', 'font-size':'.26', fill:'#b0a890', 'font-family':'Courier New', 'fill-opacity':'.5', 'pointer-events':'none' });
  dim.textContent = `${W} × ${H} m · 8 pers`;
  g.appendChild(dim);

  // Hit area
  g.appendChild(el('rect', { x:0, y:0, width:W, height:H, fill:'none', 'pointer-events':'all' }));
  if (sel) {
    g.appendChild(el('rect', { x:-.12, y:-.12, width:W+.24, height:H+.24, fill:'none', stroke:'#fff', 'stroke-width':'.1', rx:'.1', 'stroke-dasharray':'.32,.2', 'pointer-events':'none' }));
    for (const [hx,hy] of [[0,0],[W,0],[0,H],[W,H]])
      g.appendChild(el('rect', { x:hx-.22, y:hy-.22, width:.44, height:.44, fill:'#fff', stroke:'#4a4a4a', 'stroke-width':'.06', rx:'.08', 'pointer-events':'none' }));
  }
}

// ─── LIVING GERVASIONI · 4 sofás enfrentados ──────────────
function drawLiving(g, item, sel) {
  const w = item.w, h = item.h;
  const cx = w/2, cy = h/2;
  const sD  = Math.min(w, h) * .19;  // profundidad del sofá
  const sWH = Math.min(w * .68, h * .8);  // ancho sofás horizontales
  const sWV = Math.min(h * .68, w * .8);  // ancho sofás verticales
  const sFill   = '#e0d8cc';
  const sBack   = '#ccc4b6';
  const sStroke = '#a09888';
  const sCush   = '#ede8de';

  // Sombra
  g.appendChild(el('rect', { x:.04, y:.05, width:w, height:h, fill:'#000', 'fill-opacity':'.12', rx:'.08', 'pointer-events':'none' }));

  // ── SOFÁ NORTE ──
  const nY = sD * .2;
  const nX = cx - sWH/2;
  g.appendChild(el('rect', { x:nX, y:nY, width:sWH, height:sD, fill:sFill, stroke:sStroke, 'stroke-width':'.03', rx:'.07' }));
  g.appendChild(el('rect', { x:nX, y:0, width:sWH, height:sD*.3, fill:sBack, stroke:sStroke, 'stroke-width':'.025', rx:'.05' }));  // respaldo
  g.appendChild(el('rect', { x:nX+.04, y:nY+.04, width:sWH*.46-.04, height:sD-.08, fill:sCush, rx:'.05', 'pointer-events':'none' }));
  g.appendChild(el('rect', { x:nX+sWH*.5+.02, y:nY+.04, width:sWH*.46-.04, height:sD-.08, fill:sCush, rx:'.05', 'pointer-events':'none' }));

  // ── SOFÁ SUR ──
  const sY = h - sD - sD*.2;
  g.appendChild(el('rect', { x:nX, y:sY, width:sWH, height:sD, fill:sFill, stroke:sStroke, 'stroke-width':'.03', rx:'.07' }));
  g.appendChild(el('rect', { x:nX, y:sY+sD*.7, width:sWH, height:sD*.3, fill:sBack, stroke:sStroke, 'stroke-width':'.025', rx:'.05' }));
  g.appendChild(el('rect', { x:nX+.04, y:sY+.04, width:sWH*.46-.04, height:sD-.08, fill:sCush, rx:'.05', 'pointer-events':'none' }));
  g.appendChild(el('rect', { x:nX+sWH*.5+.02, y:sY+.04, width:sWH*.46-.04, height:sD-.08, fill:sCush, rx:'.05', 'pointer-events':'none' }));

  // ── SOFÁ OESTE ──
  const wX = sD * .2;
  const wY = cy - sWV/2;
  g.appendChild(el('rect', { x:wX, y:wY, width:sD, height:sWV, fill:sFill, stroke:sStroke, 'stroke-width':'.03', rx:'.07' }));
  g.appendChild(el('rect', { x:0, y:wY, width:sD*.3, height:sWV, fill:sBack, stroke:sStroke, 'stroke-width':'.025', rx:'.05' }));
  g.appendChild(el('rect', { x:wX+.04, y:wY+.04, width:sD-.08, height:sWV*.46-.04, fill:sCush, rx:'.05', 'pointer-events':'none' }));
  g.appendChild(el('rect', { x:wX+.04, y:wY+sWV*.5+.02, width:sD-.08, height:sWV*.46-.04, fill:sCush, rx:'.05', 'pointer-events':'none' }));

  // ── SOFÁ ESTE ──
  const eX = w - sD - sD*.2;
  g.appendChild(el('rect', { x:eX, y:wY, width:sD, height:sWV, fill:sFill, stroke:sStroke, 'stroke-width':'.03', rx:'.07' }));
  g.appendChild(el('rect', { x:eX+sD*.7, y:wY, width:sD*.3, height:sWV, fill:sBack, stroke:sStroke, 'stroke-width':'.025', rx:'.05' }));
  g.appendChild(el('rect', { x:eX+.04, y:wY+.04, width:sD-.08, height:sWV*.46-.04, fill:sCush, rx:'.05', 'pointer-events':'none' }));
  g.appendChild(el('rect', { x:eX+.04, y:wY+sWV*.5+.02, width:sD-.08, height:sWV*.46-.04, fill:sCush, rx:'.05', 'pointer-events':'none' }));

  // ── MESA DE CENTRO ──
  const tW = sWH * .35, tH = sWV * .3;
  g.appendChild(el('rect', { x:cx-tW/2+.04, y:cy-tH/2+.05, width:tW, height:tH, fill:'#000', 'fill-opacity':'.14', rx:'.06', 'pointer-events':'none' }));
  g.appendChild(el('rect', { x:cx-tW/2, y:cy-tH/2, width:tW, height:tH, fill:'#b0a898', stroke:'#888078', 'stroke-width':'.025', rx:'.06' }));
  // Reflejo cristal
  g.appendChild(el('rect', { x:cx-tW/2+.04, y:cy-tH/2+.03, width:tW*.38, height:tH*.35, fill:'#fff', 'fill-opacity':'.18', rx:'.04', 'pointer-events':'none' }));

  // Label
  const lbl = el('text', { x:cx, y:h+.36, 'text-anchor':'middle', 'font-size':'.34', fill:'#c0906c', 'font-family':'Courier New', 'fill-opacity':'.88', 'pointer-events':'none' });
  lbl.textContent = item.label;
  g.appendChild(lbl);
  const dim = el('text', { x:cx, y:h+.58, 'text-anchor':'middle', 'font-size':'.26', fill:'#c0906c', 'font-family':'Courier New', 'fill-opacity':'.5', 'pointer-events':'none' });
  dim.textContent = `${w} × ${h} m`;
  g.appendChild(dim);

  g.appendChild(el('rect', { x:0, y:0, width:w, height:h, fill:'none', 'pointer-events':'all' }));
  if (sel) {
    g.appendChild(el('rect', { x:-.12, y:-.12, width:w+.24, height:h+.24, fill:'none', stroke:'#fff', 'stroke-width':'.1', rx:'.1', 'stroke-dasharray':'.32,.2', 'pointer-events':'none' }));
    for (const [hx,hy] of [[0,0],[w,0],[0,h],[w,h]])
      g.appendChild(el('rect', { x:hx-.22, y:hy-.22, width:.44, height:.44, fill:'#fff', stroke:'#4a4a4a', 'stroke-width':'.06', rx:'.08', 'pointer-events':'none' }));
  }
}

// ─── SIDEBAR ──────────────────────────────────────────────
function itemSubLabel(it) {
  if (it.type === 'bombita')   return `${it.w} m · tira LED`;
  if (it.type === 'bebedero')  return `${it.w} × ${it.h} m · bebedero`;
  if (it.type === 'reflector') return `Ø ${it.w} m · reflector`;
  if (it.type === 'cuina')     return `${it.w} × ${it.h} m · catering`;
  if (it.type === 'barra')     return `${it.w} m · fardos`;
  if (it.type === 'living')    return `${it.w} × ${it.h} m · living`;
  if (it.type === 'mesaimp')   return `3 × 1 m · 8 pers`;
  if (it.type === 'vela')      return `vela · ${it.w} m`;
  if (it.type === 'livingf')   return `${it.w} × ${it.h} m · fardos`;
  if (it.type === 'sanitario') return `6.5 × 4 m · Baño VIP`;
  if (it.type === 'texto')     return `etiqueta`;
  return `${it.w} × ${it.h} m`;
}

function itemDimsLabel(item) {
  if (item.type === 'bombita')   return `${item.w} m · tira LED · ${item.rot}°`;
  if (item.type === 'bebedero')  return `${item.w} × ${item.h} m · bebedero · ${item.rot}°`;
  if (item.type === 'reflector') return `Ø ${item.w} m · reflector · ${item.rot}°`;
  if (item.type === 'sanitario') return `6.5 × 4 m · Baño VIP · ${item.rot}°`;
  return `${item.w} × ${item.h} m  ·  ${item.rot}°`;
}

// grupos colapsados por tipo (true = colapsado)
const groupStates = {};

function renderSidebar() {
  const item = S.items.find(i => i.id === S.selId);

  // ── Panel seleccionado ──
  const panel = document.getElementById('sel-panel');
  const lightsRow = document.getElementById('lights-row');
  const lightsBtn = document.getElementById('btn-lights');
  if (item) {
    panel.classList.add('visible');
    document.getElementById('sel-name').textContent = item.label;
    document.getElementById('sel-dims').textContent = itemDimsLabel(item);
    if (item.type === 'pista') {
      lightsRow.style.display = '';
      lightsBtn.textContent  = item.lightsOn ? '💡 Luces ON' : '💡 Luces OFF';
      lightsBtn.className    = `btn btn-sm ${item.lightsOn ? 'btn-lights-on' : 'btn-lights-off'}`;
    } else {
      lightsRow.style.display = 'none';
    }
  } else {
    panel.classList.remove('visible');
    lightsRow.style.display = 'none';
  }

  // ── Contador total ──
  document.getElementById('item-count').textContent = S.items.length;

  // ── Lista agrupada por tipo ──
  const listEl = document.getElementById('item-list');
  if (S.items.length === 0) {
    listEl.innerHTML = '<div class="empty">Sin ítems todavía</div>';
  } else {
    // Agrupar manteniendo el orden de TYPES
    const groups = {};
    for (const it of S.items) {
      (groups[it.type] = groups[it.type] || []).push(it);
    }
    listEl.innerHTML = '';
    for (const type of Object.keys(TYPES)) {
      if (!groups[type]) continue;
      const items = groups[type];
      const cfg   = TYPES[type];
      const open  = groupStates[type] === true; // default: colapsado

      const groupEl = document.createElement('div');
      groupEl.className = 'item-group';

      const hdr = document.createElement('div');
      hdr.className = `group-hdr ${open ? 'open' : 'closed'}`;
      hdr.innerHTML = `
        <div class="group-dot" style="background:${cfg.color}"></div>
        <span class="group-name">${cfg.label}</span>
        <span class="group-cnt">${items.length}</span>
        <span class="group-chev">▾</span>`;
      hdr.onclick = () => { groupStates[type] = !groupStates[type]; renderSidebar(); };

      const body = document.createElement('div');
      body.className = `group-body ${open ? 'open' : 'closed'}`;

      for (const it of items) {
        const row = document.createElement('div');
        row.className = 'item-row' + (it.id === S.selId ? ' active' : '');
        row.innerHTML = `
          <div class="item-dot" style="background:${cfg.color}"></div>
          <div class="item-text">
            <div class="item-lbl">${it.label}</div>
            <div class="item-sub">${itemSubLabel(it)}</div>
          </div>`;
        row.onclick = () => { S.selId = it.id; render(); };
        body.appendChild(row);
      }

      groupEl.append(hdr, body);
      listEl.appendChild(groupEl);
    }
    // Tipos custom no en TYPES
    for (const [type, items] of Object.entries(groups)) {
      if (TYPES[type]) continue;
      // fallback: mostrar plano
      for (const it of items) {
        const row = document.createElement('div');
        row.className = 'item-row' + (it.id === S.selId ? ' active' : '');
        row.innerHTML = `<div class="item-text"><div class="item-lbl">${it.label}</div></div>`;
        row.onclick = () => { S.selId = it.id; render(); };
        listEl.appendChild(row);
      }
    }
  }

  // ── Stats ──
  const counts = {};
  for (const it of S.items) counts[it.type] = (counts[it.type] || 0) + 1;
  const statsEl = document.getElementById('stats');
  if (Object.keys(counts).length === 0) {
    statsEl.innerHTML = '<div class="empty" style="grid-column:1/-1">—</div>';
  } else {
    statsEl.innerHTML = '';
    for (const [t, n] of Object.entries(counts)) {
      const cfg  = TYPES[t] || TYPES.otro;
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML = `<div class="stat-n" style="color:${cfg.color}">${n}</div><div class="stat-l">${cfg.label}</div>`;
      statsEl.appendChild(card);
    }
  }
}

// ─── DRAG ─────────────────────────────────────────────────
function beginDrag(clientX, clientY, id) {
  S.selId = id;
  render();
  const item = S.items.find(i => i.id === id);
  const pt   = clientToSVG(clientX, clientY);
  drag = { id, offX: pt.x - item.x, offY: pt.y - item.y };
}

function moveDrag(clientX, clientY) {
  if (!drag) return;
  const pt   = clientToSVG(clientX, clientY);
  const item = S.items.find(i => i.id === drag.id);
  if (!item) return;
  item.x = +( pt.x - drag.offX ).toFixed(2);
  item.y = +( pt.y - drag.offY ).toFixed(2);
  // Actualizar DOM y caché directamente (sin pasar por render)
  const cache = itemCache.get(drag.id);
  if (cache) {
    cache.node.setAttribute('transform', `translate(${item.x},${item.y})`);
    cache.x = item.x;
    cache.y = item.y;
  }
}

function endDrag() {
  if (drag) { save(); drag = null; }
}

document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
document.addEventListener('mouseup',   endDrag);
document.addEventListener('touchmove', e => {
  if (!drag) return;
  e.preventDefault();
  moveDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchend', endDrag);

svgEl.addEventListener('mousedown', e => {
  if (!e.target.closest('[data-id]')) { S.selId = null; render(); }
});

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!S.selId) return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); del(); }
  else if (e.key === 'r' || e.key === 'R') rotate(e.shiftKey ? -15 : 15);
  else if (e.key === 'd' || e.key === 'D') dup();
  else if (e.key === 'Escape') { S.selId = null; render(); }
});

// ─── ACTIONS ──────────────────────────────────────────────
function addItem() {
  const type   = document.getElementById('i-type').value;
  const rawLbl = document.getElementById('i-label').value.trim();
  const label  = rawLbl || TYPES[type].label + ' ' + S.nextId;
  const w = parseFloat(document.getElementById('i-w').value) || 2;
  const h = parseFloat(document.getElementById('i-h').value) || 2;

  const item = {
    id: S.nextId++, type, label, w, h,
    x: +(27 - w / 2).toFixed(2),
    y: +(22 - h / 2).toFixed(2),
    rot: 0,
    lightsOn: false,
  };
  S.items.push(item);
  S.selId = item.id;
  document.getElementById('i-label').value = '';
  save();
  render();
}

function del() {
  S.items = S.items.filter(i => i.id !== S.selId);
  S.selId = null;
  save(); render();
}

function dup() {
  const src = S.items.find(i => i.id === S.selId);
  if (!src) return;
  const copy = { ...src, id: S.nextId++, x: src.x + 1.5, y: src.y + 1.5 };
  S.items.push(copy);
  S.selId = copy.id;
  save(); render();
}

function rotate(delta) {
  const item = S.items.find(i => i.id === S.selId);
  if (!item) return;
  item.rot = (item.rot + delta + 360) % 360;
  save(); render();
}

// ─── BUTTON EVENTS ────────────────────────────────────────
document.getElementById('btn-add').onclick    = addItem;
document.getElementById('btn-lights').onclick = () => {
  const item = S.items.find(i => i.id === S.selId);
  if (!item || item.type !== 'pista') return;
  item.lightsOn = !item.lightsOn;
  save(); render();
};
document.getElementById('btn-rl').onclick  = () => rotate(-15);
document.getElementById('btn-rr').onclick  = () => rotate(15);
document.getElementById('btn-dup').onclick = dup;
document.getElementById('btn-del').onclick = del;

document.getElementById('btn-clear').onclick = () => {
  if (confirm('¿Eliminar todos los ítems del mapa?')) {
    S.items = []; S.selId = null;
    save(); render();
  }
};

document.getElementById('i-label').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

document.getElementById('i-type').addEventListener('change', e => {
  document.getElementById('i-label').placeholder =
    (TYPES[e.target.value]?.label || '') + ' 1';
  if (e.target.value === 'bebedero') {
    document.getElementById('i-w').value = 7;
    document.getElementById('i-h').value = 1.0;
  } else if (e.target.value === 'bombita') {
    document.getElementById('i-w').value = 10;
    document.getElementById('i-h').value = 0.25;
  } else if (e.target.value === 'reflector') {
    document.getElementById('i-w').value = 0.5;
    document.getElementById('i-h').value = 0.5;
  } else if (e.target.value === 'pista') {
    document.getElementById('i-w').value = 6;
    document.getElementById('i-h').value = 6;
  } else if (e.target.value === 'mesaimp') {
    document.getElementById('i-w').value = 3;
    document.getElementById('i-h').value = 1;
  } else if (e.target.value === 'cuina') {
    document.getElementById('i-w').value = 8;
    document.getElementById('i-h').value = 8;
  } else if (e.target.value === 'barra') {
    document.getElementById('i-w').value = 4;
    document.getElementById('i-h').value = 1.2;
  } else if (e.target.value === 'living') {
    document.getElementById('i-w').value = 3.5;
    document.getElementById('i-h').value = 3.5;
  } else if (e.target.value === 'livingf') {
    document.getElementById('i-w').value = 3.5;
    document.getElementById('i-h').value = 3.5;
  } else if (e.target.value === 'vela') {
    document.getElementById('i-w').value = 0.3;
    document.getElementById('i-h').value = 0.3;
  } else if (e.target.value === 'sanitario') {
    document.getElementById('i-w').value = 6.5;
    document.getElementById('i-h').value = 4;
  } else if (e.target.value === 'texto') {
    document.getElementById('i-w').value = 3;
    document.getElementById('i-h').value = 0.5;
    document.getElementById('i-label').placeholder = 'Escribe el texto aquí';
  }
  // Bloquear dimensiones para Mesa Imperial
  const locked = e.target.value === 'mesaimp';
  document.getElementById('i-w').disabled = locked;
  document.getElementById('i-h').disabled = locked;
});

// ─── NIGHT MODE ───────────────────────────────────────────
let nightMode = false;
document.getElementById('btn-night').onclick = () => {
  nightMode = !nightMode;
  document.body.classList.toggle('night', nightMode);
  document.getElementById('btn-night').textContent =
    nightMode ? '☀  Subir luz' : '☾  Bajar luz';
};

// ─── INIT ─────────────────────────────────────────────────
load();
render();
</script>
