<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maqueta · Casco</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --col-mesa:     #d4a853;
  --col-pista:    #4a7fb5;
  --col-barra:    #8a5c35;
  --col-comida:   #5a8a5a;
  --col-deco:     #9a5a8a;
  --col-bombita:  #ffcc44;
  --col-bebedero: #4aacdc;
  --col-otro:     #6a6a6a;
}

body {
  font-family: 'Courier New', monospace;
  background: #111;
  color: #ddd;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

/* ── MAP ── */
#map-wrap {
  flex: 1;
  min-width: 0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#map-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #555;
  flex-shrink: 0;
}

#svg-container {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

#venue {
  width: 100%;
  height: 100%;
  user-select: none;
  overflow: visible;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 288px;
  flex-shrink: 0;
  background: #181818;
  border-left: 1px solid #252525;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.s-section { display: flex; flex-direction: column; gap: 8px; }

.s-title {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: #555;
  padding-bottom: 7px;
  border-bottom: 1px solid #222;
}

label {
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-size: 10px;
  color: #666;
}

select, input {
  background: #222;
  border: 1px solid #2e2e2e;
  border-radius: 3px;
  color: #ddd;
  font-family: inherit;
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
  width: 100%;
}
select:focus, input:focus { border-color: #9a7a50; }

.frow { display: flex; gap: 6px; }
.frow label { flex: 1; }

.btn {
  border: none;
  border-radius: 3px;
  font-family: inherit;
  font-size: 11px;
  padding: 7px 10px;
  cursor: pointer;
  text-align: center;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn:hover { opacity: .8; }
.btn-add   { background: #9a7a50; color: #f0e8d8; width: 100%; }
.btn-sm    { padding: 5px 8px; font-size: 10px; }
.btn-ghost { background: #232323; color: #aaa; border: 1px solid #2e2e2e; flex: 1; }
.btn-del   { background: #3e1818; color: #e0a0a0; flex: 1; }
.btn-clear { background: #2a1414; color: #b07070; border: 1px solid #3a2020; width: 100%; }

/* Selected panel */
#sel-panel          { display: none; }
#sel-panel.visible  { display: flex; flex-direction: column; gap: 8px; }
#sel-name { font-size: 12px; color: #ccc; }
#sel-dims { font-size: 10px; color: #666; }

/* Item list */
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 7px;
  border-radius: 3px;
  background: #202020;
  border: 1px solid transparent;
  cursor: pointer;
}
.item-row:hover  { border-color: #2e2e2e; }
.item-row.active { border-color: #9a7a50; }

.item-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.item-text { flex: 1; min-width: 0; }
.item-lbl  { font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-sub  { font-size: 9px; color: #555; }

/* Stats */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-card { background: #1e1e1e; border-radius: 3px; padding: 10px; text-align: center; }
.stat-n { font-size: 22px; font-weight: bold; }
.stat-l { font-size: 9px; color: #555; margin-top: 2px; }

.empty { font-size: 10px; color: #444; text-align: center; padding: 10px; }

/* ── LED STRIP ── */
@keyframes led-twinkle {
  0%, 100% { opacity: 1; }
  50%       { opacity: .28; }
}
.led-bulb { animation: led-twinkle 2.2s ease-in-out infinite; }
.led-glow { animation: led-twinkle 2.2s ease-in-out infinite; }

/* ── REFLECTOR ── */
@keyframes reflector-flicker {
  0%, 100% { opacity: .06; }
  48%       { opacity: .09; }
  50%       { opacity: .07; }
  52%       { opacity: .10; }
}
@keyframes reflector-flicker-night {
  0%, 100% { opacity: .55; }
  48%       { opacity: .72; }
  50%       { opacity: .60; }
  52%       { opacity: .75; }
}
.reflector-beam        { animation: reflector-flicker       4s ease-in-out infinite; }
body.night .reflector-beam { animation: reflector-flicker-night 4s ease-in-out infinite; }

/* ── NIGHT MODE ── */
#night-rect { pointer-events: none; opacity: 0; transition: opacity .7s ease; }
body.night  #night-rect { opacity: 1; }
.led-bloom  { opacity: .07; transition: opacity .7s ease; }
body.night  .led-bloom  { opacity: .55; }
.btn-night  { background: #12122a; color: #7070b8; border: 1px solid #28285a; width: 100%; }
body.night  .btn-night  { background: #1e1e48; color: #a0a0e0; border-color: #4848a0; }

/* ── BEBEDERO ── */
@keyframes beb-shimmer {
  0%, 100% { opacity: .45; }
  50%       { opacity: .82; }
}
@keyframes beb-sparkle {
  0%, 75%, 100% { opacity: 0; }
  38%            { opacity: 1; }
}
@keyframes beb-can-gleam {
  0%, 80%, 100% { opacity: .75; }
  40%            { opacity: 1; }
}
.beb-shimmer  { animation: beb-shimmer  3.8s ease-in-out infinite; }
.beb-sparkle  { animation: beb-sparkle  3.2s ease-in-out infinite; }
.beb-can      { animation: beb-can-gleam 4s  ease-in-out infinite; }

#hint {
  padding: 8px 14px;
  font-size: 9px;
  color: #3a3a3a;
  border-top: 1px solid #1e1e1e;
  letter-spacing: .04em;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- ═══ MAP ═══ -->
<div id="map-wrap">
  <div id="map-top">
    <span>CASCO &nbsp;·&nbsp; PLANTA &nbsp;·&nbsp; 54 × 44 m</span>
    <span id="scale-lbl"></span>
  </div>
  <div id="svg-container">
    <svg id="venue"
         viewBox="-2 -2 58 48"
         preserveAspectRatio="xMidYMid meet"
         xmlns="http://www.w3.org/2000/svg">

      <!-- ── FILTER DEFS ── -->
      <defs>
        <filter id="filter-led" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation=".1" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="filter-cold" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur in="SourceGraphic" stdDeviation=".07" result="blur"/>
          <feFlood flood-color="#60c8ff" flood-opacity=".35" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge>
            <feMergeNode in="glow"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="filter-item-shadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx=".06" dy=".08" stdDeviation=".06" flood-color="#000" flood-opacity=".4"/>
        </filter>

        <!-- Grass texture filters -->
        <filter id="filter-grass-1" filterUnits="userSpaceOnUse" x="0" y="0" width="54" height="44">
          <feTurbulence type="fractalNoise" baseFrequency="0.13 0.08" numOctaves="4" seed="17" result="n"/>
          <feColorMatrix in="n" type="luminanceToAlpha" result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
        </filter>
        <filter id="filter-grass-2" filterUnits="userSpaceOnUse" x="0" y="0" width="54" height="44">
          <feTurbulence type="fractalNoise" baseFrequency="0.52 0.62" numOctaves="2" seed="31" result="n"/>
          <feColorMatrix in="n" type="luminanceToAlpha" result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
        </filter>
        <filter id="filter-grass-3" filterUnits="userSpaceOnUse" x="0" y="0" width="54" height="44">
          <feTurbulence type="fractalNoise" baseFrequency="0.06 0.04" numOctaves="2" seed="5" result="n"/>
          <feColorMatrix in="n" type="luminanceToAlpha" result="a"/>
          <feComposite in="SourceGraphic" in2="a" operator="in"/>
        </filter>

        <!-- LED / bebedero / reflector light bloom -->
        <filter id="filter-led-bloom" x="-30%" y="-250%" width="160%" height="600%">
          <feGaussianBlur stdDeviation=".65"/>
        </filter>
        <filter id="filter-reflector-beam" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="1.1"/>
        </filter>

        <!-- Higuera: desplazamiento orgánico para bordes irregulares -->
        <filter id="filter-higuera" filterUnits="userSpaceOnUse"
                x="22.5" y="7.5" width="9" height="8.5">
          <feTurbulence type="fractalNoise" baseFrequency="1.8 2.2"
                        numOctaves="2" seed="37" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n"
                             scale=".1" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>

      <!-- ── BACKGROUNDS ── -->
      <rect x="-2" y="-2" width="58" height="48" fill="#161616"/>

      <!-- ── PASTO ── dark base (menos saturado, más real) -->
      <rect x="0" y="0" width="54" height="44" fill="#2e4e12"/>
      <!-- manchas verdes naturales -->
      <rect x="0" y="0" width="54" height="44" fill="#415e1a" filter="url(#filter-grass-1)" opacity=".92"/>
      <!-- detalle fino, tonos más apagados -->
      <rect x="0" y="0" width="54" height="44" fill="#5a7824" filter="url(#filter-grass-2)" opacity=".32"/>
      <!-- pasto seco amarillo-opaco -->
      <rect x="0" y="0" width="54" height="44" fill="#68701a" filter="url(#filter-grass-3)" opacity=".16"/>

      <!-- ── A1: HILERA ÁRBOLES NORTE ── -->
      <rect x="0" y="0" width="27" height="4" fill="#6a9440" opacity=".75"/>
      <text x="13.5" y="2.5" text-anchor="middle"
            font-size=".85" fill="#4a6a30" font-family="Courier New"
            letter-spacing=".05em">HILERA DE ÁRBOLES · 4 M</text>

      <!-- ── A1: CASA ── -->
      <rect x="3.5" y="29" width="20" height="15" fill="#cec6b4"/>
      <line x1="3.5" y1="29" x2="23.5" y2="44" stroke="#a89878" stroke-width=".2"/>
      <line x1="23.5" y1="29" x2="3.5" y2="44" stroke="#a89878" stroke-width=".2"/>
      <rect x="3.5" y="29" width="20" height="15" fill="none"
            stroke="#a09080" stroke-width=".2"/>
      <text x="13.5" y="37.5" text-anchor="middle"
            font-size="1.2" fill="#908070" font-family="Courier New"
            letter-spacing=".08em">CASA</text>

      <!-- ── A1: ÁRBOLES LATERAL OESTE ── -->
      <circle cx="1" cy="6"  r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="10" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="14" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="18" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="22" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="1" cy="26" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>

      <!-- ── A1: COTAS ── -->
      <line x1="2.8" y1="4"  x2="2.3" y2="4"  stroke="#a09080" stroke-width=".12"/>
      <line x1="2.8" y1="28" x2="2.3" y2="28" stroke="#a09080" stroke-width=".12"/>
      <line x1="2.55" y1="4" x2="2.55" y2="28" stroke="#a09080" stroke-width=".12"/>
      <text font-size=".72" fill="#a09080" font-family="Courier New"
            text-anchor="middle"
            transform="translate(1.8,16) rotate(-90)">24 m</text>

      <!-- ── A1: LABEL ── -->
      <text x="13.5" y="18.5" text-anchor="middle"
            font-size="2.5" fill="#c8bfae" font-family="Courier New"
            font-weight="bold">A1</text>

      <!-- ── DIVISORIA ── -->
      <line x1="27" y1="0" x2="27" y2="44"
            stroke="#7a7060" stroke-width=".12" stroke-dasharray=".7,.4"/>

      <!-- ── HIGUERA · vista superior realista · Ø 5.5 m ── -->
      <!-- Sombra proyectada (desplazada al SE, árbol "media caída") -->
      <ellipse cx="27.7" cy="11.9" rx="3.1" ry="2.8" fill="#131e06" fill-opacity=".28"/>

      <!-- Cuerpo del árbol con bordes orgánicos (feDisplacementMap) -->
      <g filter="url(#filter-higuera)">
        <!-- Base: sombra interior densa -->
        <circle cx="27" cy="11" r="2.72" fill="#1e3a0c"/>
        <!-- Ramas/masas de follaje principales (8 lóbulos irregulares) -->
        <ellipse cx="27.0" cy="8.7"  rx="1.55" ry="1.25" fill="#2a5210"/>
        <ellipse cx="28.9" cy="9.5"  rx="1.35" ry="1.4"  fill="#285010"/>
        <ellipse cx="29.5" cy="11.3" rx="1.22" ry="1.55" fill="#2c5412"/>
        <ellipse cx="28.7" cy="13.0" rx="1.5"  ry="1.3"  fill="#2a5010"/>
        <!-- lobes sur más caídos (el árbol inclina al S-SO) -->
        <ellipse cx="27.0" cy="13.6" rx="1.65" ry="1.22" fill="#285010"/>
        <ellipse cx="25.0" cy="12.8" rx="1.38" ry="1.45" fill="#2a5212"/>
        <ellipse cx="24.5" cy="11.0" rx="1.25" ry="1.48" fill="#2c5412"/>
        <ellipse cx="25.2" cy="9.1"  rx="1.38" ry="1.22" fill="#2a5210"/>
        <!-- Centro más iluminado -->
        <circle cx="27"   cy="11"   r="1.85"              fill="#375e18"/>
        <!-- Capa media (verde medio) -->
        <ellipse cx="27.0" cy="8.95" rx="0.9"  ry="0.75"  fill="#456a1e"/>
        <ellipse cx="28.7" cy="9.85" rx="0.82" ry="0.88"  fill="#426618"/>
        <ellipse cx="29.1" cy="11.4" rx="0.75" ry="0.92"  fill="#446820"/>
        <ellipse cx="28.3" cy="12.8" rx="0.85" ry="0.75"  fill="#426618"/>
        <ellipse cx="26.8" cy="13.3" rx="0.9"  ry="0.7"   fill="#456a1e"/>
        <ellipse cx="25.0" cy="12.5" rx="0.78" ry="0.88"  fill="#426618"/>
        <ellipse cx="24.7" cy="10.9" rx="0.75" ry="0.9"   fill="#446820"/>
        <ellipse cx="25.4" cy="9.2"  rx="0.82" ry="0.72"  fill="#456a1e"/>
        <!-- Highlights: sol pegando en las hojas superiores -->
        <ellipse cx="26.8" cy="8.8"  rx="0.44" ry="0.32"  fill="#5e8c2c" fill-opacity=".9"/>
        <ellipse cx="28.6" cy="9.6"  rx="0.38" ry="0.4"   fill="#5a8828" fill-opacity=".9"/>
        <ellipse cx="29.0" cy="11.2" rx="0.34" ry="0.44"  fill="#5c8a2a" fill-opacity=".9"/>
        <ellipse cx="28.1" cy="12.7" rx="0.4"  ry="0.32"  fill="#5a8828" fill-opacity=".9"/>
        <ellipse cx="26.6" cy="13.2" rx="0.42" ry="0.3"   fill="#5e8c2c" fill-opacity=".9"/>
        <ellipse cx="24.9" cy="12.2" rx="0.36" ry="0.38"  fill="#5a8828" fill-opacity=".9"/>
        <ellipse cx="24.7" cy="10.7" rx="0.32" ry="0.4"   fill="#5c8a2a" fill-opacity=".9"/>
      </g>

      <!-- Ramas principales (muy sutiles, debajo del follaje) -->
      <g opacity=".35">
        <line x1="27" y1="11" x2="27.1" y2="8.8"  stroke="#1a1206" stroke-width=".1"/>
        <line x1="27" y1="11" x2="29.0" y2="9.7"  stroke="#1a1206" stroke-width=".1"/>
        <line x1="27" y1="11" x2="29.3" y2="11.5" stroke="#1a1206" stroke-width=".1"/>
        <line x1="27" y1="11" x2="28.2" y2="13.1" stroke="#1a1206" stroke-width=".1"/>
        <line x1="27" y1="11" x2="26.5" y2="13.4" stroke="#1a1206" stroke-width=".1"/>
        <line x1="27" y1="11" x2="24.8" y2="12.6" stroke="#1a1206" stroke-width=".1"/>
        <line x1="27" y1="11" x2="24.5" y2="11.0" stroke="#1a1206" stroke-width=".1"/>
        <line x1="27" y1="11" x2="25.2" y2="9.1"  stroke="#1a1206" stroke-width=".1"/>
      </g>
      <!-- Tronco -->
      <circle cx="27" cy="11" r=".21" fill="#3a2810" stroke="#221608" stroke-width=".06"/>

      <!-- Label higuera -->
      <text x="30.4" y="10.6" font-size=".86" fill="#3a5a20" font-family="Courier New" font-weight="bold">higuera</text>
      <text x="30.4" y="11.8" font-size=".72" fill="#587040" font-family="Courier New">Ø 5.5 M</text>

      <!-- ── BOMBA ── -->
      <circle cx="27" cy="22" r=".6" fill="#2a2a2a" stroke="#555" stroke-width=".15"/>
      <text x="27.9" y="22.4"
            font-size=".88" fill="#7a7060" font-family="Courier New">BOMBA</text>

      <!-- ── A2: LABEL ── -->
      <text x="40.5" y="24" text-anchor="middle"
            font-size="2.5" fill="#c8bfae" font-family="Courier New"
            font-weight="bold">A2</text>

      <!-- ── TRANQUERA ── -->
      <line x1="51.5" y1="0" x2="51.5" y2=".8" stroke="#666" stroke-width=".2"/>
      <line x1="54"   y1="0" x2="54"   y2=".8" stroke="#666" stroke-width=".2"/>
      <text x="52.75" y="2.2" text-anchor="middle"
            font-size=".75" fill="#6a6050" font-family="Courier New">TRANQUERA · 2.5 M</text>

      <!-- ── GINGO ── -->
      <circle cx="47.5" cy="2.2" r="1.5"
              fill="#a8c890" fill-opacity=".55"
              stroke="#4a6a30" stroke-width=".18"/>
      <circle cx="47.5" cy="2.2" r=".28" fill="#4a6a30"/>
      <text x="47.5" y="4.6" text-anchor="middle"
            font-size=".78" fill="#4a6a30" font-family="Courier New">GINGO</text>

      <!-- ── OMBÚ ── -->
      <circle cx="42.5" cy="2.3" r="1.75"
              fill="#a8c890" fill-opacity=".55"
              stroke="#4a6a30" stroke-width=".18"/>
      <circle cx="42.5" cy="2.3" r=".28" fill="#4a6a30"/>
      <text x="42.5" y="4.9" text-anchor="middle"
            font-size=".78" fill="#4a6a30" font-family="Courier New">OMBÚ</text>

      <!-- ── ÁLAMOS ESTE ── -->
      <circle cx="53" cy="3"  r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="7"  r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="11" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="15" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="19" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="23" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="27" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="31" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="35" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="39" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <circle cx="53" cy="43" r=".5" fill="none" stroke="#5a8040" stroke-width=".18"/>
      <text text-anchor="middle" font-size=".75" fill="#5a8040" font-family="Courier New"
            letter-spacing=".05em"
            transform="translate(55.8,22) rotate(90)">ÁLAMOS · E</text>

      <!-- ── PALENQUE ── -->
      <rect x="30" y="35" width="1" height="4"
            fill="#9a8870" stroke="#7a7060" stroke-width=".14"/>
      <text x="31.8" y="37.8"
            font-size=".74" fill="#7a7060" font-family="Courier New">PALENQUE · 4 × 1 M</text>

      <!-- ── CERCO EXTERIOR ── -->
      <line x1="0" y1="0" x2="51.5" y2="0" stroke="#444" stroke-width=".28"/>
      <line x1="0" y1="44" x2="54" y2="44" stroke="#444" stroke-width=".28"/>
      <line x1="0" y1="0" x2="0" y2="44" stroke="#444" stroke-width=".28"/>
      <line x1="54" y1="0" x2="54" y2="44" stroke="#444" stroke-width=".28"/>

      <!-- ── BRÚJULA ── -->
      <g transform="translate(2,41.5)">
        <circle r="1.2" fill="none" stroke="#555" stroke-width=".15"/>
        <polygon points="0,-1 .38,.4 0,.1 -.38,.4" fill="#888"/>
        <text y="-1.55" text-anchor="middle"
              font-size=".85" fill="#666" font-family="Courier New">N</text>
      </g>

<script>
'use strict';

// ─── CONFIG ───────────────────────────────────────────────
const TYPES = {
  mesa:     { label: 'Mesa',           color: '#d4a853', fg: '#1a0e00' },
  pista:    { label: 'Pista de baile', color: '#4a7fb5', fg: '#e0eaf8' },
  barra:    { label: 'Barra',          color: '#8a5c35', fg: '#f0e8d8' },
  comida:   { label: 'Sector comida',  color: '#5a8a5a', fg: '#e0f0e0' },
  deco:     { label: 'Decoración',     color: '#9a5a8a', fg: '#f8e0f8' },
  bombita:  { label: 'Bombita LED',    color: '#ffcc44', fg: '#3a2800' },
  bebedero:  { label: 'Bebedero',       color: '#4aacdc', fg: '#001828' },
  reflector: { label: 'Reflector',     color: '#e8e0a0', fg: '#1a1800' },
  otro:      { label: 'Otro',          color: '#6a6a6a', fg: '#f0f0f0' },
};

const NS  = 'http://www.w3.org/2000/svg';
const KEY = 'casco-maqueta-v1';

// ─── STATE ────────────────────────────────────────────────
let S    = { items: [], selId: null, nextId: 1 };
let drag = null;

// ─── PERSISTENCE ──────────────────────────────────────────
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(_) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (d && Array.isArray(d.items)) S = d;
  } catch(_) {}
}

// ─── SVG UTILS ────────────────────────────────────────────
const svgEl = document.getElementById('venue');
const layer = document.getElementById('items-layer');

function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function clientToSVG(cx, cy) {
  const pt = svgEl.createSVGPoint();
  pt.x = cx; pt.y = cy;
  return pt.matrixTransform(svgEl.getScreenCTM().inverse());
}

// ─── ITEM CACHE ───────────────────────────────────────────
// Clave que representa el estado visual de un ítem (sin posición).
// Si esta clave no cambia, el nodo SVG se reutiliza tal cual.
const itemCache = new Map(); // id → { node, key, x, y }

function itemKey(item, sel) {
  return `${item.type}|${item.w}|${item.h}|${item.rot}|${sel?1:0}|${item.label}`;
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  const seen = new Set();

  for (const item of S.items) {
    seen.add(item.id);
    const sel   = item.id === S.selId;
    const key   = itemKey(item, sel);
    const cache = itemCache.get(item.id);

    if (!cache || cache.key !== key) {
      // Estado visual cambió → reconstruir nodo
      if (cache) cache.node.remove();
      const node = buildItem(item, sel);
      itemCache.set(item.id, { node, key, x: item.x, y: item.y });
    } else if (cache.x !== item.x || cache.y !== item.y) {
      // Solo cambió la posición → actualizar transform (barato)
      cache.node.setAttribute('transform', `translate(${item.x},${item.y})`);
      cache.x = item.x;
      cache.y = item.y;
    }
  }

  // Eliminar nodos de ítems borrados
  for (const [id, cache] of itemCache) {
    if (!seen.has(id)) { cache.node.remove(); itemCache.delete(id); }
  }

  // Reordenar DOM para que coincida con S.items (moves baratos, no clones)
  const frag = document.createDocumentFragment();
  for (const item of S.items) frag.appendChild(itemCache.get(item.id).node);
  layer.appendChild(frag);

  renderSidebar();
}

function buildItem(item, sel) {
  const cfg = TYPES[item.type] || TYPES.otro;
  const hw  = item.w / 2;
  const hh  = item.h / 2;

  const outer = el('g', {
    'data-id': item.id,
    transform: `translate(${item.x},${item.y})`,
    cursor: 'grab',
  });
  const inner = el('g', { transform: `rotate(${item.rot},${hw},${hh})` });

  if (item.type === 'bombita') {
    drawLedStrip(inner, item, sel);
  } else if (item.type === 'bebedero') {
    drawBebedero(inner, item, sel);
  } else if (item.type === 'reflector') {
    drawReflector(inner, item, sel);
  } else {
    // Drop shadow
    inner.appendChild(el('rect', {
      x: .04, y: .05, width: item.w, height: item.h,
      fill: '#000', 'fill-opacity': '.22', rx: '.12',
      'pointer-events': 'none',
    }));
    // Body
    inner.appendChild(el('rect', {
      x: 0, y: 0, width: item.w, height: item.h,
      fill: cfg.color,
      'fill-opacity': sel ? '1' : '.88',
      stroke: sel ? '#ffffff' : '#00000033',
      'stroke-width': sel ? '.14' : '.07',
      rx: '.12',
    }));
    // Top highlight gleam
    inner.appendChild(el('rect', {
      x: .06, y: .05, width: item.w - .12, height: Math.min(.18, hh * .4),
      fill: '#fff', 'fill-opacity': '.14', rx: '.08',
      'pointer-events': 'none',
    }));

    const fs  = Math.min(.92, Math.max(.44, Math.min(hw, hh) * .5));
    const lbl = el('text', {
      x: hw, y: hh + fs * .38,
      'text-anchor': 'middle', 'font-size': fs,
      fill: cfg.fg, 'font-family': 'Courier New',
      'pointer-events': 'none',
    });
    lbl.textContent = item.label;
    inner.appendChild(lbl);

    if (item.w >= 1.5 || item.h >= 1.5) {
      const dfs = fs * .7;
      const dim = el('text', {
        x: hw, y: hh + fs * .38 + dfs * 1.35,
        'text-anchor': 'middle', 'font-size': dfs,
        fill: cfg.fg, 'font-family': 'Courier New',
        'fill-opacity': '.6', 'pointer-events': 'none',
      });
      dim.textContent = `${item.w}×${item.h} m`;
      inner.appendChild(dim);
    }

    if (sel) {
      for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
        inner.appendChild(el('rect', {
          x: cx-.22, y: cy-.22, width: .44, height: .44,
          fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
          rx: '.08', 'pointer-events': 'none',
        }));
      }
    }
  }

  outer.appendChild(inner);

  outer.addEventListener('mousedown', e => {
    e.stopPropagation();
    beginDrag(e.clientX, e.clientY, item.id);
  });
  outer.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    beginDrag(e.touches[0].clientX, e.touches[0].clientY, item.id);
  }, { passive: false });

  return outer;
}

// ─── LED STRIP ────────────────────────────────────────────
function drawLedStrip(g, item, sel) {
  const nBulbs  = Math.max(3, Math.round(item.w / 0.45));
  const spacing = item.w / nBulbs;
  const cableY  = item.h * .5;
  const bulbR   = Math.min(.22, item.h * .4);

  // Warm light bloom (más visible en modo noche)
  g.appendChild(el('ellipse', {
    cx: item.w / 2, cy: cableY,
    rx: item.w / 2 + .9, ry: 1.6,
    fill: '#ffd060',
    filter: 'url(#filter-led-bloom)',
    'pointer-events': 'none',
    class: 'led-bloom',
  }));

  // PCB strip base (dark bar)
  g.appendChild(el('rect', {
    x: 0, y: cableY - bulbR * .55, width: item.w, height: bulbR * 1.1,
    fill: '#1a1000', rx: '.04', 'pointer-events': 'none',
  }));
  // PCB strip highlight
  g.appendChild(el('rect', {
    x: 0, y: cableY - bulbR * .55, width: item.w, height: bulbR * .25,
    fill: '#3a2800', 'fill-opacity': '.7', rx: '.04', 'pointer-events': 'none',
  }));

  for (let i = 0; i < nBulbs; i++) {
    const cx    = (i + .5) * spacing;
    const delay = ((i * .13) % 2.2).toFixed(2);

    g.appendChild(el('circle', {
      cx, cy: cableY, r: bulbR * 2.4,
      fill: '#ffdd66', 'fill-opacity': '.13',
      'pointer-events': 'none',
      class: 'led-glow',
      style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('circle', {
      cx, cy: cableY, r: bulbR,
      fill: '#ffe566', stroke: '#cc9900', 'stroke-width': '.035',
      filter: 'url(#filter-led)',
      'pointer-events': 'none',
      class: 'led-bulb',
      style: `animation-delay:${delay}s`,
    }));
  }

  const lblEl = el('text', {
    x: item.w / 2, y: item.h + .38,
    'text-anchor': 'middle', 'font-size': '.38',
    fill: '#ffcc44', 'font-family': 'Courier New',
    'fill-opacity': '.82', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  const dimEl = el('text', {
    x: item.w / 2, y: item.h + .65,
    'text-anchor': 'middle', 'font-size': '.3',
    fill: '#ffcc44', 'font-family': 'Courier New',
    'fill-opacity': '.45', 'pointer-events': 'none',
  });
  dimEl.textContent = `${item.w} m`;
  g.appendChild(dimEl);

  // Hit area: captura eventos en todo el bounding box del item
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: 'none', 'pointer-events': 'all',
  }));

  if (sel) {
    g.appendChild(el('rect', {
      x: -.15, y: -.15, width: item.w + .3, height: item.h + .3,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      rx: '.12', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none',
    }));
    for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: cx-.22, y: cy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── BEBEDERO ─────────────────────────────────────────────
function drawBebedero(g, item, sel) {
  const brd = 0.055;
  const iX  = brd, iY = brd;
  const iW  = item.w - brd * 2;
  const iH  = item.h - brd * 2;

  // Cold light bloom (más visible en modo noche)
  g.appendChild(el('ellipse', {
    cx: item.w / 2, cy: item.h * .5,
    rx: item.w / 2 + .55, ry: .95,
    fill: '#48c0ff',
    filter: 'url(#filter-led-bloom)',
    'pointer-events': 'none',
    class: 'led-bloom',
  }));

  // Drop shadow
  g.appendChild(el('rect', {
    x: .03, y: .04, width: item.w, height: item.h,
    fill: '#000', 'fill-opacity': '.35', rx: '.06',
    'pointer-events': 'none',
  }));

  // Outer steel trough frame
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: '#5a3d1e', stroke: '#2c1a08', 'stroke-width': '.04', rx: '.06',
  }));
  // Frame top rim highlight
  g.appendChild(el('rect', {
    x: .01, y: .01, width: item.w - .02, height: brd * .5,
    fill: '#9a6838', 'fill-opacity': '.55', rx: '.04',
    'pointer-events': 'none',
  }));
  // Frame bottom shadow
  g.appendChild(el('rect', {
    x: .01, y: item.h - brd * .4, width: item.w - .02, height: brd * .4,
    fill: '#1a0c04', 'fill-opacity': '.4', rx: '.03',
    'pointer-events': 'none',
  }));

  // Ice/water base fill (static dark blue)
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: '#3a88b0', rx: '.03', 'pointer-events': 'none',
  }));
  // Ice shimmer overlay (animated lighter blue)
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: '#90d4f8', rx: '.03',
    class: 'beb-shimmer', 'pointer-events': 'none',
  }));
  // Surface top reflection
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH * .32,
    fill: '#c8ecff', 'fill-opacity': '.45', rx: '.03',
    'pointer-events': 'none',
  }));

  // Beer can tops (2 rows, spaced proportionally)
  const canR  = Math.min(.042, iH * .32);
  const nCans = Math.max(4, Math.round(iW / .2));
  const canSp = iW / nCans;
  for (let i = 0; i < nCans; i++) {
    const cx    = iX + (i + .5) * canSp;
    const dly   = ((i * .17) % 4).toFixed(2);
    for (const ry of [.28, .72]) {
      const cy = iY + ry * iH;
      // Can body (aluminum top view)
      g.appendChild(el('circle', {
        cx, cy, r: canR,
        fill: '#c8a830', stroke: '#907018', 'stroke-width': '.01',
        'fill-opacity': '.9', 'pointer-events': 'none',
        class: 'beb-can', style: `animation-delay:${dly}s`,
      }));
      // Can ring/tab
      g.appendChild(el('circle', {
        cx, cy: cy - canR * .22, r: canR * .32,
        fill: '#a09050', 'pointer-events': 'none',
      }));
    }
  }

  // Section dividers (trough has 3 compartments)
  for (let d = 1; d <= 2; d++) {
    g.appendChild(el('rect', {
      x: item.w * (d / 3) - .025, y: 0,
      width: .05, height: item.h,
      fill: '#2c1a08', 'pointer-events': 'none',
    }));
  }

  // Ice crystal sparkles
  const sparks = [
    [.06,.45],[.17,.22],[.28,.78],[.39,.38],[.5,.62],
    [.61,.28],[.72,.72],[.83,.42],[.94,.58],
  ];
  for (const [fx, fy] of sparks) {
    const delay = ((fx * 4.1 + fy * 2.3) % 3.2).toFixed(2);
    // 4-point star sparkle (cross of two small rects)
    const cx = iX + fx * iW;
    const cy = iY + fy * iH;
    g.appendChild(el('line', {
      x1: cx - .045, y1: cy, x2: cx + .045, y2: cy,
      stroke: '#fff', 'stroke-width': '.022',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('line', {
      x1: cx, y1: cy - .045, x2: cx, y2: cy + .045,
      stroke: '#fff', 'stroke-width': '.022',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    // Diagonal arms (for 8-point star effect)
    g.appendChild(el('line', {
      x1: cx - .028, y1: cy - .028, x2: cx + .028, y2: cy + .028,
      stroke: '#c8eeff', 'stroke-width': '.013',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
    g.appendChild(el('line', {
      x1: cx + .028, y1: cy - .028, x2: cx - .028, y2: cy + .028,
      stroke: '#c8eeff', 'stroke-width': '.013',
      'pointer-events': 'none',
      class: 'beb-sparkle', style: `animation-delay:${delay}s`,
    }));
  }

  // Cold glow filter on the inner area
  g.appendChild(el('rect', {
    x: iX, y: iY, width: iW, height: iH,
    fill: 'none', rx: '.03',
    filter: 'url(#filter-cold)',
    'pointer-events': 'none',
  }));

  // Label (below trough)
  const lblEl = el('text', {
    x: item.w / 2, y: item.h + .36,
    'text-anchor': 'middle', 'font-size': '.38',
    fill: '#4aacdc', 'font-family': 'Courier New',
    'fill-opacity': '.9', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  const dimEl = el('text', {
    x: item.w / 2, y: item.h + .62,
    'text-anchor': 'middle', 'font-size': '.29',
    fill: '#4aacdc', 'font-family': 'Courier New',
    'fill-opacity': '.5', 'pointer-events': 'none',
  });
  dimEl.textContent = `${item.w} × ${item.h} m · cervezas & hielo`;
  g.appendChild(dimEl);

  // Hit area: captura eventos en todo el bounding box del item
  g.appendChild(el('rect', {
    x: 0, y: 0, width: item.w, height: item.h,
    fill: 'none', 'pointer-events': 'all',
  }));

  // Selection highlight
  if (sel) {
    g.appendChild(el('rect', {
      x: -.14, y: -.14, width: item.w + .28, height: item.h + .28,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      rx: '.1', 'stroke-dasharray': '.32,.2', 'pointer-events': 'none',
    }));
    for (const [cx, cy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: cx-.22, y: cy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── REFLECTOR ────────────────────────────────────────────
function drawReflector(g, item, sel) {
  const cx = item.w / 2;
  const cy = item.h / 2;
  const fr = Math.min(item.w, item.h) * .44; // radio del fixture
  const lr = Math.max(item.w, item.h) * 5.5; // radio del cono de luz

  // Cono de luz (grande, va "hacia afuera") — muy visible en modo noche
  g.appendChild(el('circle', {
    cx, cy, r: lr,
    fill: '#fffce0', 'fill-opacity': '1',
    filter: 'url(#filter-reflector-beam)',
    'pointer-events': 'none',
    class: 'reflector-beam',
  }));

  // Drop shadow del fixture
  g.appendChild(el('circle', {
    cx: cx + fr * .18, cy: cy + fr * .22, r: fr,
    fill: '#000', 'fill-opacity': '.35',
    'pointer-events': 'none',
  }));
  // Cuerpo del fixture (carcasa negra)
  g.appendChild(el('circle', {
    cx, cy, r: fr,
    fill: '#1e1e1e', stroke: '#505050', 'stroke-width': '.035',
  }));
  // Aro exterior cromado
  g.appendChild(el('circle', {
    cx, cy, r: fr * .88,
    fill: 'none', stroke: '#888878', 'stroke-width': '.025',
    'pointer-events': 'none',
  }));
  // Lente / reflector interior
  g.appendChild(el('circle', {
    cx, cy, r: fr * .62,
    fill: '#d8d4a0', stroke: '#b8b480', 'stroke-width': '.02',
    'pointer-events': 'none',
  }));
  // Centro brillante (filamento/LED)
  g.appendChild(el('circle', {
    cx, cy, r: fr * .28,
    fill: '#f8f8e8',
    filter: 'url(#filter-led)',
    'pointer-events': 'none',
    class: 'led-bulb',
    style: 'animation-duration:5s',
  }));
  // Tornillos de montaje (4 puntos en la carcasa)
  for (const [dx, dy] of [[.7,.7],[-.7,.7],[.7,-.7],[-.7,-.7]]) {
    g.appendChild(el('circle', {
      cx: cx + fr * dx * .75, cy: cy + fr * dy * .75, r: fr * .08,
      fill: '#444', 'pointer-events': 'none',
    }));
  }

  // Label
  const lblEl = el('text', {
    x: cx, y: item.h + .36,
    'text-anchor': 'middle', 'font-size': '.35',
    fill: '#c8c490', 'font-family': 'Courier New',
    'fill-opacity': '.85', 'pointer-events': 'none',
  });
  lblEl.textContent = item.label;
  g.appendChild(lblEl);

  // Hit area
  g.appendChild(el('circle', {
    cx, cy, r: fr + .15,
    fill: 'none', 'pointer-events': 'all',
  }));

  // Selection
  if (sel) {
    g.appendChild(el('circle', {
      cx, cy, r: fr + .2,
      fill: 'none', stroke: '#fff', 'stroke-width': '.1',
      'stroke-dasharray': '.28,.18', 'pointer-events': 'none',
    }));
    for (const [hx, hy] of [[0,0],[item.w,0],[0,item.h],[item.w,item.h]]) {
      g.appendChild(el('rect', {
        x: hx-.22, y: hy-.22, width: .44, height: .44,
        fill: '#fff', stroke: '#4a4a4a', 'stroke-width': '.06',
        rx: '.08', 'pointer-events': 'none',
      }));
    }
  }
}

// ─── SIDEBAR ──────────────────────────────────────────────
function itemSubLabel(it) {
  if (it.type === 'bombita')   return `${it.w} m · tira LED`;
  if (it.type === 'bebedero')  return `${it.w} × ${it.h} m · bebedero`;
  if (it.type === 'reflector') return `Ø ${it.w} m · reflector`;
  return `${it.w} × ${it.h} m`;
}

function itemDimsLabel(item) {
  if (item.type === 'bombita')   return `${item.w} m · tira LED · ${item.rot}°`;
  if (item.type === 'bebedero')  return `${item.w} × ${item.h} m · bebedero · ${item.rot}°`;
  if (item.type === 'reflector') return `Ø ${item.w} m · reflector · ${item.rot}°`;
  return `${item.w} × ${item.h} m  ·  ${item.rot}°`;
}

function renderSidebar() {
  const item = S.items.find(i => i.id === S.selId);

  const panel = document.getElementById('sel-panel');
  if (item) {
    panel.classList.add('visible');
    document.getElementById('sel-name').textContent = item.label;
    document.getElementById('sel-dims').textContent = itemDimsLabel(item);
  } else {
    panel.classList.remove('visible');
  }

  document.getElementById('item-count').textContent = S.items.length;

  const listEl = document.getElementById('item-list');
  if (S.items.length === 0) {
    listEl.innerHTML = '<div class="empty">Sin ítems todavía</div>';
  } else {
    listEl.innerHTML = '';
    for (const it of S.items) {
      const cfg = TYPES[it.type] || TYPES.otro;
      const row = document.createElement('div');
      row.className = 'item-row' + (it.id === S.selId ? ' active' : '');
      row.innerHTML = `
        <div class="item-dot" style="background:${cfg.color}"></div>
        <div class="item-text">
          <div class="item-lbl">${it.label}</div>
          <div class="item-sub">${itemSubLabel(it)}</div>
        </div>`;
      row.onclick = () => { S.selId = it.id; render(); };
      listEl.appendChild(row);
    }
  }

  const counts = {};
  for (const it of S.items) counts[it.type] = (counts[it.type] || 0) + 1;
  const statsEl = document.getElementById('stats');
  if (Object.keys(counts).length === 0) {
    statsEl.innerHTML = '<div class="empty" style="grid-column:1/-1">—</div>';
  } else {
    statsEl.innerHTML = '';
    for (const [t, n] of Object.entries(counts)) {
      const cfg = TYPES[t] || TYPES.otro;
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML =
        `<div class="stat-n" style="color:${cfg.color}">${n}</div>` +
        `<div class="stat-l">${cfg.label}</div>`;
      statsEl.appendChild(card);
    }
  }
}

// ─── DRAG ─────────────────────────────────────────────────
function beginDrag(clientX, clientY, id) {
  S.selId = id;
  render();
  const item = S.items.find(i => i.id === id);
  const pt   = clientToSVG(clientX, clientY);
  drag = { id, offX: pt.x - item.x, offY: pt.y - item.y };
}

function moveDrag(clientX, clientY) {
  if (!drag) return;
  const pt   = clientToSVG(clientX, clientY);
  const item = S.items.find(i => i.id === drag.id);
  if (!item) return;
  item.x = +( pt.x - drag.offX ).toFixed(2);
  item.y = +( pt.y - drag.offY ).toFixed(2);
  // Actualizar DOM y caché directamente (sin pasar por render)
  const cache = itemCache.get(drag.id);
  if (cache) {
    cache.node.setAttribute('transform', `translate(${item.x},${item.y})`);
    cache.x = item.x;
    cache.y = item.y;
  }
}

function endDrag() {
  if (drag) { save(); drag = null; }
}

document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
document.addEventListener('mouseup',   endDrag);
document.addEventListener('touchmove', e => {
  if (!drag) return;
  e.preventDefault();
  moveDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchend', endDrag);

svgEl.addEventListener('mousedown', e => {
  if (!e.target.closest('[data-id]')) { S.selId = null; render(); }
});

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!S.selId) return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); del(); }
  else if (e.key === 'r' || e.key === 'R') rotate(e.shiftKey ? -15 : 15);
  else if (e.key === 'd' || e.key === 'D') dup();
  else if (e.key === 'Escape') { S.selId = null; render(); }
});

// ─── ACTIONS ──────────────────────────────────────────────
function addItem() {
  const type   = document.getElementById('i-type').value;
  const rawLbl = document.getElementById('i-label').value.trim();
  const label  = rawLbl || TYPES[type].label + ' ' + S.nextId;
  const w = parseFloat(document.getElementById('i-w').value) || 2;
  const h = parseFloat(document.getElementById('i-h').value) || 2;

  const item = {
    id: S.nextId++, type, label, w, h,
    x: +(27 - w / 2).toFixed(2),
    y: +(22 - h / 2).toFixed(2),
    rot: 0,
  };
  S.items.push(item);
  S.selId = item.id;
  document.getElementById('i-label').value = '';
  save();
  render();
}

function del() {
  S.items = S.items.filter(i => i.id !== S.selId);
  S.selId = null;
  save(); render();
}

function dup() {
  const src = S.items.find(i => i.id === S.selId);
  if (!src) return;
  const copy = { ...src, id: S.nextId++, x: src.x + 1.5, y: src.y + 1.5 };
  S.items.push(copy);
  S.selId = copy.id;
  save(); render();
}

function rotate(delta) {
  const item = S.items.find(i => i.id === S.selId);
  if (!item) return;
  item.rot = (item.rot + delta + 360) % 360;
  save(); render();
}

// ─── BUTTON EVENTS ────────────────────────────────────────
document.getElementById('btn-add').onclick = addItem;
document.getElementById('btn-rl').onclick  = () => rotate(-15);
document.getElementById('btn-rr').onclick  = () => rotate(15);
document.getElementById('btn-dup').onclick = dup;
document.getElementById('btn-del').onclick = del;

document.getElementById('btn-clear').onclick = () => {
  if (confirm('¿Eliminar todos los ítems del mapa?')) {
    S.items = []; S.selId = null;
    save(); render();
  }
};

document.getElementById('i-label').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

document.getElementById('i-type').addEventListener('change', e => {
  document.getElementById('i-label').placeholder =
    (TYPES[e.target.value]?.label || '') + ' 1';
  if (e.target.value === 'bombita') {
    document.getElementById('i-w').value = 10;
    document.getElementById('i-h').value = 0.6;
  } else if (e.target.value === 'bebedero') {
    document.getElementById('i-w').value = 7;
    document.getElementById('i-h').value = 0.6;
  } else if (e.target.value === 'reflector') {
    document.getElementById('i-w').value = 0.5;
    document.getElementById('i-h').value = 0.5;
  }
});

// ─── NIGHT MODE ───────────────────────────────────────────
let nightMode = false;
document.getElementById('btn-night').onclick = () => {
  nightMode = !nightMode;
  document.body.classList.toggle('night', nightMode);
  document.getElementById('btn-night').textContent =
    nightMode ? '☀  Subir luz' : '☾  Bajar luz';
};

// ─── INIT ─────────────────────────────────────────────────
load();
render();
</script>
</body>
